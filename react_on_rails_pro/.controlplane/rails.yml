# Template setup of Rails server workload, roughly corresponding to Heroku dyno
# type within Procfile.
kind: workload
name: rails
spec:
  type: standard
  containers:
    - name: rails
      cpu: 512m
      env:
        - name: LOG_LEVEL
          value: debug
      # Inherit other ENV values from GVC
      inheritEnv: true
      image: '/org/APP_ORG/image/APP_IMAGE'
      # TODO add liveness probe
      memory: 1Gi
      ports:
        - number: 3000
          protocol: http
    - name: node-renderer
      args:
        - renderer/node-renderer.js
      command: node
      cpu: 512m
      env:
        - name: LOG_LEVEL
          value: debug
      inheritEnv: true
      image: '/org/APP_ORG/image/APP_IMAGE'
      # TODO add liveness probe
      memory: 1Gi
      ports:
        - number: 3800
          protocol: http
  defaultOptions:
    # Public/staging test apps keep one warm replica while Capacity AI right-sizes CPU and memory.
    autoscaling:
      metric: disabled
      minScale: 1
      maxScale: 1
    capacityAI: true
  firewallConfig:
    external:
      # Default to allow public access to Rails server
      inboundAllowCIDR:
        - 0.0.0.0/0
      # Could configure outbound for more security
      outboundAllowCIDR:
        - 0.0.0.0/0
