# React Intl RSC Demo translations - English
# These translations demonstrate react-intl with React Server Components.
# ICU MessageFormat syntax (plurals, select, etc.) is used directly for React-only strings.

en:
  page:
    title: "React Intl RSC Demo"
    subtitle: "Server Components with i18n powered by React.cache()"
    section:
      greeting: "Greeting"
      stats: "Live Stats"
      products: "Featured Products"
      dates: "Date & Time Formatting"
      relative: "Relative Time"
      numbers: "Number Formatting"
      lists: "List Formatting"
      displayNames: "Display Names"
      advanced: "Advanced ICU Patterns"
      footer: "Footer"

  greeting: "Hello! Welcome to our store."

  stats:
    visitors: "{count, plural, one {# visitor} other {# visitors}} today"
    orders: "{count, plural, one {# order} other {# orders}} this week"
    rating: "Average rating: {rating}/5"
    revenue: "Revenue this month"
    conversion: "Conversion rate"

  product:
    title: "Featured Products"
    widget:
      name: "Turbo Widget"
      description: "High-performance widget for demanding workloads."
    gadget:
      name: "Smart Gadget"
      description: "AI-powered gadget that learns your preferences."
    sensor:
      name: "Nano Sensor"
      description: "Ultra-precise sensor for industrial monitoring."
    price: "Price: {price}"
    stock: "{count, plural, one {# unit} other {# units}} in stock"
    badge:
      new: "New"
      sale: "On Sale"
      popular: "Popular"

  dates:
    now: "Current date & time"
    short: "Short date"
    long: "Long date"
    full: "Full date"
    timeOnly: "Time only"
    dateRange: "Event range"
    eventStart: "Starts"
    eventEnd: "Ends"
    weekday: "Day of week"
    era: "With era"

  relative:
    justNow: "Last login"
    minutesAgo: "Last message"
    hoursAgo: "Last order"
    daysAgo: "Account created"
    inFuture: "Subscription renews"
    monthsAgo: "Last review"
    label: "{label}"

  numbers:
    integer: "Population"
    decimal: "Pi constant"
    percent: "Battery level"
    currency: "Account balance"
    currencyAccounting: "Profit / Loss"
    compact: "World population"
    scientific: "Speed of light"
    unit:
      speed: "Wind speed"
      temp: "Temperature"
      data: "Storage used"
      weight: "Package weight"
    signDisplay: "Stock change"

  lists:
    conjunction: "Available colors"
    disjunction: "Payment methods"
    features: "Key features"
    color:
      red: "Red"
      blue: "Blue"
      green: "Green"
      black: "Black"
    pay:
      card: "Credit Card"
      paypal: "PayPal"
      crypto: "Crypto"
    feat:
      fast: "Lightning fast"
      secure: "Bank-grade security"
      support: "24/7 support"
      api: "REST API"

  display:
    language: "Language name"
    region: "Region name"
    currency: "Currency name"
    script: "Script name"
    selfLanguage: "This page language"

  advanced:
    gender: "{gender, select, male {He} female {She} other {They}} ordered {count, plural, one {# item} other {# items}}."
    ordinal: "You finished in {place, selectordinal, one {#st} two {#nd} few {#rd} other {#th}} place!"
    nested: "{hostCount, plural, one {{host} is hosting} other {{host} and {otherCount, plural, one {# other} other {# others}} are hosting}} the event."
    richText: "Read our <link>terms of service</link> and <bold>privacy policy</bold>."
    escape: "It's {percent} off — don't miss out!"

  footer:
    rendered_at: "Server-rendered at {time}"
    locale: "Current locale: {locale}"
    cache_note: "The intl instance is created once per request via React.cache() — all components share it."
    components: "{count, plural, one {# component} other {# components}} rendered on the server using the same cached intl instance."
