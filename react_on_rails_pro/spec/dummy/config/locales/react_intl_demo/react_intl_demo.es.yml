# React Intl RSC Demo translations - Spanish
# These translations demonstrate react-intl with React Server Components.
# ICU MessageFormat syntax (plurals, select, etc.) is used directly for React-only strings.

es:
  page:
    title: "Demo React Intl RSC"
    subtitle: "Componentes de servidor con i18n impulsado por React.cache()"
    section:
      greeting: "Saludo"
      stats: "Estadísticas en vivo"
      products: "Productos destacados"
      dates: "Formato de fecha y hora"
      relative: "Tiempo relativo"
      numbers: "Formato de números"
      lists: "Formato de listas"
      displayNames: "Nombres de visualización"
      advanced: "Patrones ICU avanzados"
      footer: "Pie de página"

  greeting: "¡Hola! Bienvenido a nuestra tienda."

  stats:
    visitors: "{count, plural, one {# visitante} other {# visitantes}} hoy"
    orders: "{count, plural, one {# pedido} other {# pedidos}} esta semana"
    rating: "Calificación promedio: {rating}/5"
    revenue: "Ingresos este mes"
    conversion: "Tasa de conversión"

  product:
    title: "Productos destacados"
    widget:
      name: "Turbo Widget"
      description: "Widget de alto rendimiento para cargas de trabajo exigentes."
    gadget:
      name: "Gadget inteligente"
      description: "Gadget con IA que aprende tus preferencias."
    sensor:
      name: "Nano Sensor"
      description: "Sensor ultrapreciso para monitoreo industrial."
    price: "Precio: {price}"
    stock: "{count, plural, one {# unidad} other {# unidades}} en stock"
    badge:
      new: "Nuevo"
      sale: "Oferta"
      popular: "Popular"

  dates:
    now: "Fecha y hora actual"
    short: "Fecha corta"
    long: "Fecha larga"
    full: "Fecha completa"
    timeOnly: "Solo hora"
    dateRange: "Rango del evento"
    eventStart: "Comienza"
    eventEnd: "Termina"
    weekday: "Día de la semana"
    era: "Con era"

  relative:
    justNow: "Último inicio de sesión"
    minutesAgo: "Último mensaje"
    hoursAgo: "Último pedido"
    daysAgo: "Cuenta creada"
    inFuture: "Renovación de suscripción"
    monthsAgo: "Última reseña"
    label: "{label}"

  numbers:
    integer: "Población"
    decimal: "Constante Pi"
    percent: "Nivel de batería"
    currency: "Saldo de cuenta"
    currencyAccounting: "Ganancia / Pérdida"
    compact: "Población mundial"
    scientific: "Velocidad de la luz"
    unit:
      speed: "Velocidad del viento"
      temp: "Temperatura"
      data: "Almacenamiento usado"
      weight: "Peso del paquete"
    signDisplay: "Cambio de acciones"

  lists:
    conjunction: "Colores disponibles"
    disjunction: "Métodos de pago"
    features: "Características clave"
    color:
      red: "Rojo"
      blue: "Azul"
      green: "Verde"
      black: "Negro"
    pay:
      card: "Tarjeta de crédito"
      paypal: "PayPal"
      crypto: "Cripto"
    feat:
      fast: "Ultra rápido"
      secure: "Seguridad bancaria"
      support: "Soporte 24/7"
      api: "API REST"

  display:
    language: "Nombre del idioma"
    region: "Nombre de la región"
    currency: "Nombre de la moneda"
    script: "Nombre del script"
    selfLanguage: "Idioma de esta página"

  advanced:
    gender: "{gender, select, male {Él pidió} female {Ella pidió} other {Pidieron}} {count, plural, one {# artículo} other {# artículos}}."
    ordinal: "¡Terminaste en el puesto {place, selectordinal, other {#º}}!"
    nested: "{hostCount, plural, one {{host} organiza} other {{host} y {otherCount, plural, one {# más} other {# más}} organizan}} el evento."
    richText: "Lee nuestros <link>términos de servicio</link> y la <bold>política de privacidad</bold>."
    escape: "¡{percent} de descuento — no te lo pierdas!"

  footer:
    rendered_at: "Renderizado en el servidor a las {time}"
    locale: "Idioma actual: {locale}"
    cache_note: "La instancia intl se crea una vez por solicitud mediante React.cache() — todos los componentes la comparten."
    components: "{count, plural, one {# componente} other {# componentes}} renderizados en el servidor usando la misma instancia intl en caché."
