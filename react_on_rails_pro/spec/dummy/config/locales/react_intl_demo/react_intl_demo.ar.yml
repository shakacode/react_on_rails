# React Intl RSC Demo translations - Arabic
# These translations demonstrate react-intl with React Server Components.
# Arabic uses all six CLDR plural forms: zero, one, two, few, many, other.

ar:
  page:
    title: "عرض React Intl RSC"
    subtitle: "مكونات الخادم مع التدويل بواسطة React.cache()"
    section:
      greeting: "التحية"
      stats: "إحصائيات مباشرة"
      products: "المنتجات المميزة"
      dates: "تنسيق التاريخ والوقت"
      relative: "الوقت النسبي"
      numbers: "تنسيق الأرقام"
      lists: "تنسيق القوائم"
      displayNames: "أسماء العرض"
      advanced: "أنماط ICU المتقدمة"
      footer: "التذييل"

  greeting: "مرحباً! أهلاً بكم في متجرنا."

  stats:
    visitors: "{count, plural, zero {لا زوار} one {زائر واحد} two {زائران} few {# زوار} many {# زائرًا} other {# زائر}} اليوم"
    orders: "{count, plural, zero {لا طلبات} one {طلب واحد} two {طلبان} few {# طلبات} many {# طلبًا} other {# طلب}} هذا الأسبوع"
    rating: "متوسط التقييم: {rating}/5"
    revenue: "إيرادات هذا الشهر"
    conversion: "معدل التحويل"

  product:
    title: "المنتجات المميزة"
    widget:
      name: "ويدجت توربو"
      description: "ويدجت عالي الأداء للأعمال الصعبة."
    gadget:
      name: "أداة ذكية"
      description: "أداة مدعومة بالذكاء الاصطناعي تتعلم تفضيلاتك."
    sensor:
      name: "مستشعر نانو"
      description: "مستشعر فائق الدقة للمراقبة الصناعية."
    price: "السعر: {price}"
    stock: "{count, plural, zero {نفد المخزون} one {وحدة واحدة} two {وحدتان} few {# وحدات} many {# وحدة} other {# وحدة}} في المخزون"
    badge:
      new: "جديد"
      sale: "تخفيض"
      popular: "رائج"

  dates:
    now: "التاريخ والوقت الحالي"
    short: "تاريخ قصير"
    long: "تاريخ طويل"
    full: "تاريخ كامل"
    timeOnly: "الوقت فقط"
    dateRange: "فترة الحدث"
    eventStart: "يبدأ"
    eventEnd: "ينتهي"
    weekday: "يوم الأسبوع"
    era: "مع الحقبة"

  relative:
    justNow: "آخر تسجيل دخول"
    minutesAgo: "آخر رسالة"
    hoursAgo: "آخر طلب"
    daysAgo: "تاريخ إنشاء الحساب"
    inFuture: "تجديد الاشتراك"
    monthsAgo: "آخر مراجعة"
    label: "{label}"

  numbers:
    integer: "عدد السكان"
    decimal: "ثابت باي"
    percent: "مستوى البطارية"
    currency: "رصيد الحساب"
    currencyAccounting: "الربح / الخسارة"
    compact: "سكان العالم"
    scientific: "سرعة الضوء"
    unit:
      speed: "سرعة الرياح"
      temp: "درجة الحرارة"
      data: "المساحة المستخدمة"
      weight: "وزن الطرد"
    signDisplay: "تغير السهم"

  lists:
    conjunction: "الألوان المتاحة"
    disjunction: "طرق الدفع"
    features: "الميزات الرئيسية"
    color:
      red: "أحمر"
      blue: "أزرق"
      green: "أخضر"
      black: "أسود"
    pay:
      card: "بطاقة ائتمان"
      paypal: "باي بال"
      crypto: "عملة رقمية"
    feat:
      fast: "سرعة البرق"
      secure: "أمان بمستوى البنوك"
      support: "دعم على مدار الساعة"
      api: "واجهة REST API"

  display:
    language: "اسم اللغة"
    region: "اسم المنطقة"
    currency: "اسم العملة"
    script: "اسم الخط"
    selfLanguage: "لغة هذه الصفحة"

  advanced:
    gender: "{gender, select, male {هو طلب} female {هي طلبت} other {طلبوا}} {count, plural, zero {لا شيء} one {منتج واحد} two {منتجين} few {# منتجات} many {# منتجًا} other {# منتج}}."
    ordinal: "أنهيت في المركز {place, selectordinal, other {#}}!"
    nested: "{hostCount, plural, one {{host} يستضيف} other {{host} و{otherCount, plural, one {آخر واحد} two {آخران} few {# آخرين} many {# آخرًا} other {# آخر}} يستضيفون}} الحدث."
    richText: "اقرأ <link>شروط الخدمة</link> و<bold>سياسة الخصوصية</bold>."
    escape: "خصم {percent} — لا تفوّت الفرصة!"

  footer:
    rendered_at: "تم العرض من الخادم في {time}"
    locale: "اللغة الحالية: {locale}"
    cache_note: "يتم إنشاء مثيل intl مرة واحدة لكل طلب عبر React.cache() — تتشاركه جميع المكونات."
    components: "{count, plural, zero {لا مكونات} one {مكون واحد} two {مكونان} few {# مكونات} many {# مكونًا} other {# مكون}} تم عرضها على الخادم باستخدام نفس مثيل intl المخزن مؤقتًا."
