# .lefthook.yml
# Fast pre-commit hooks that check all changed files (staged + unstaged + untracked)
# Install with: bundle exec lefthook install

pre-commit:
  parallel: true
  commands:
    autofix:
      glob: "{*.{rb,rake,ru},**/*.{rb,rake,ru}}"
      run: bin/lefthook/ruby-autofix all-changed
      stage_fixed: true

    rubocop:
      glob: "{*.{rb,rake,ru},**/*.{rb,rake,ru}}"
      run: bin/lefthook/ruby-lint all-changed
      stage_fixed: true

    eslint:
      glob: "{*.{js,jsx,ts,tsx},**/*.{js,jsx,ts,tsx}}"
      run: bin/lefthook/eslint-lint all-changed
      stage_fixed: true

    prettier:
      glob: "{*.{js,jsx,ts,tsx,json,md,yml,yaml},**/*.{js,jsx,ts,tsx,json,md,yml,yaml}}"
      run: bin/lefthook/prettier-format all-changed
      stage_fixed: true

    markdown-links:
      glob: "{*.md,**/*.md}"
      run: bin/lefthook/markdown-link-lint all-changed --offline

    trailing-newlines:
      run: bin/lefthook/check-trailing-newlines all-changed
      stage_fixed: true

    # When any Pro file is staged, verify the staged index for every proprietary
    # Pro file. Check-only (run `--fix` and re-stage to insert/upgrade).
    pro-license-headers:
      glob: "{react_on_rails_pro/*,react_on_rails_pro/**/*,packages/react-on-rails-pro/*,packages/react-on-rails-pro/**/*,packages/react-on-rails-pro-node-renderer/*,packages/react-on-rails-pro-node-renderer/**/*}"
      run: ruby script/check-pro-license-headers --check-staged

pre-push:
  commands:
    branch-lint:
      run: bin/lefthook/ruby-lint branch

    markdown-links:
      run: bin/lefthook/markdown-link-lint branch
