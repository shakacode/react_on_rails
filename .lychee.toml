# Lychee link checker configuration
# https://lychee.cli.rs

# Accept successful responses and permanent redirects
# 200 = OK, 301/308 = Permanent Redirect
accept = ["200", "301", "308"]

# Retry failed requests (handles transient 502/503/504/429 errors)
max_retries = 6
retry_wait_time = 20

# Timeout for each request
timeout = 20

# Send a browser-like User-Agent so anti-bot defenses don't return false 403s.
# Some hosts (e.g. webaim.org) block lychee's default crawler UA via anti-bot
# rules even though the link is live. Presenting a current Chrome UA stops these
# false positives across all docs without per-host excludes. A genuine 403
# (real access failure) still fails the run, so this does not hide dead links.
# Keep the Chrome version reasonably current (bump every ~6-12 months): some
# anti-bot systems fingerprint the UA version and may flag a stale one.
user_agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/137.0.0.0 Safari/537.36"

# Exclude patterns (migrated from markdown-link-check-config.json)
exclude = [
  # ============================================================================
  # DEVELOPMENT URLS
  # ============================================================================
  '^http://localhost',
  '^https://localhost',
  '^mailto:',

  # ============================================================================
  # SITES THAT BLOCK BOTS OR REQUIRE AUTH
  # ============================================================================
  '^https://(www\.)?npmjs\.(org|com)',  # Returns 403 for automated requests
  '^https://medium\.com',  # Returns 403 for automated requests
  '^https://careersatdoordash\.com',  # Cloudflare bot challenge returns 403
  '^https://www\.linkedin\.com',
  '^https://reactrails\.slack\.com',
  '^https://invite\.reactrails\.com/?$',  # Slack invite endpoint returns 403 for automated requests
  '^https://docs\.google\.com',  # Private docs require auth
  '^https://claude\.ai',  # Returns 403 for automated requests
  '^https://bencher\.dev/(console/projects|perf)/react-on-rails-t8a9ncxo(/.*)?$',  # Dashboard and perf URLs require auth; return 403
  '^https://(www\.)?110grill\.com/?$',  # Returns 403 for automated requests

  # ============================================================================
  # KNOWN DEAD OR PROBLEMATIC URLS
  # ============================================================================
  '^https://your-shared-addr\.c9users\.io',
  '^https://hichee\.com',
  '^https?://rubyonrails\.org/doctrine',  # DNS issues
  '^https://www\.oppenheimerfunds\.com/?$',  # DNS no longer resolves

  # ============================================================================
  # SSL CERTIFICATE ISSUES
  # ============================================================================
  # Expired, hostname mismatch, or verification failed
  '^https://(www\.)?blinkinc\.com',     # SSL certificate expired
  '^https://(www\.)?flyhomes\.com',     # SSL certificate intermittently expired (#3268)
  '^https://(www\.)?localwise\.com',    # SSL verification failed
  '^https://(www\.)?mycfsapp\.com',     # SSL hostname mismatch
  '^https://(www\.)?scoutapp\.com',     # SSL hostname mismatch
  '^https://solargraph\.org',           # SSL HandshakeFailure
  '^https://undici\.nodejs\.org',       # TLS handshake in CI from Undici docs links

  # ============================================================================
  # BADGE AND CI SERVICES
  # ============================================================================
  '^https://badge\.fury\.io',  # Returns 403 for automated requests
  '^https://coveralls\.io',    # Returns 503 for automated requests

  # ============================================================================
  # SITES THAT RETURN 5xx FROM CI
  # ============================================================================
  '^https://(www\.)?reactrails\.com',      # Works locally but 504s from CI
  '^https://shakacode\.controlplane\.com', # Connection refused from CI
  '^https://storybook\.js\.org',           # Intermittent connection resets from CI
  '^https://redux\.js\.org/?$',            # Intermittent connection resets from CI
  '^https://angularjs\.org/?$',            # Connection failed from CI
  '^https://frigade\.com/blog/bundle-size-reduction-with-rsc-and-frigade/?$', # Connection failed from CI
  '^https://tanstack\.com/router',           # Connection failed from CI
  '^https://tanstack\.com/query/latest/docs/framework/react/guides/ssr$', # Connection failed from CI
  '^https://lodash\.com',                    # Connection reset from CI
  '^https://vite-ruby\.netlify\.app/?$',     # Intermittent connection resets from CI
  '^https://www\.developerway\.com/posts/react-server-components-performance$', # Returns 503 from CI
  '^https://webaim\.org/techniques/css/invisiblecontent/?$', # Returns 504 from CI

  # ============================================================================
  # PLANNED DEPLOYMENTS NOT YET LIVE
  # ============================================================================
  '^https://ror-spec-dummy\.reactrails\.com',  # spec/dummy demo - deployment pending
  '^https://reactonrails\.com/docs/getting-started/existing-rails-app',  # #2929 slug cleanup - live after docs deploy
  '^https://reactonrails\.com/docs/core-concepts/auto-bundling/?',  # #2929 slug cleanup - live after docs deploy
  '^https://reactonrails\.com/docs/api-reference/?$',  # Generated-index URL - not a standalone page
  '^https://reactonrails\.com/docs/reference/error-reference(#.*)?$',  # New generated docs page - live after docs deploy
  '^https://reactonrails\.com/docs/pro/react-server-components/rsc-payload-route-data/?$',  # #3783 docs page - live after docs deploy
  '^https://www\.reactonrails\.com/llms(-full(-pro)?)?\.txt$',  # Machine-readable docs endpoints; serving tracked in reactonrails.com#126
  '^https://reactonrails\.com/docs/building-features/debugging-hydration-mismatches/?$',  # #3892 docs page - live after docs deploy

  # ============================================================================
  # SITES FROM PROJECTS.MD THAT BLOCK BOTS OR ARE UNRELIABLE
  # ============================================================================
  '^https://blog\.shakacode\.com',  # May block automated requests
  '^https?://(www\.)?foxford\.ru',  # Russian site, often blocks bots
  '^https://(www\.)?airgoat\.com',  # Returns 403
  '^https://(www\.)?first\.io',     # Returns 403
  '^https://(www\.)?estately\.com', # Returns 403
  '^https://hiring\.careerbuilder\.com',  # Returns 403
  '^https://(www\.)?yourmechanic\.com',  # Returns 403/503
  '^https://(www\.)?guavapass\.com',  # TLS handshake failures from CI
  '^https?://(www\.)?hvmn\.com',  # Returns 503 from CI
  '^https://(www\.)?hawaiichee\.com/?$', # Intermittent 500 from CI
  '^https://deliveroo\.co\.uk/?$', # Returns 403 for automated requests

  # ============================================================================
  # EXTERNAL SITES THAT TIMEOUT DURING CI CHECKS
  # ============================================================================
  '^https?://(www\.)?pivotaltracker\.com',  # Timeout in CI
  '^https?://(www\.)?undeveloped\.com',  # Timeout in CI
  '^https://devchat\.tv',  # Ruby Rogues podcast - times out in CI
  '^https?://chris\.beams\.io/posts/git-commit/?$',  # Timeout in CI
  '^https?://chlg\.co',  # URL shortener - times out in CI
  '^https?://contributor-covenant\.org',  # Timeout in CI
  '^https://www\.diva-portal\.org/smash/get/diva2:1903931/FULLTEXT01\.pdf$',  # Intermittent timeout in CI

  # ============================================================================
  # CHANGELOG GITHUB LINKS
  # ============================================================================
  # CHANGELOG.md contains GitHub compare links for each release. The latest
  # release link always references a tag that doesn't exist yet (created after
  # the changelog is committed). Exclude all compare links since they're
  # auto-generated by changelog tooling. GitHub PR pages also intermittently
  # return 5xx responses to lychee in CI, even when the pages are live.
  '^https://github\.com/shakacode/react_on_rails/compare/',
  # PR pages intermittently return 5xx from CI; XXXX is the changelog placeholder used by
  # in-flight batch PRs until the coordinator substitutes the real PR number.
  '^https://github\.com/shakacode/react_on_rails/pull/([0-9]+|XXXX)$',
  '^https://github\.com/shakacode/react_on_rails/actions/workflows/pro-test-package-and-gem\.yml$',  # Intermittent 502 from GitHub Actions workflow pages in CI
  '^https://github\.com/shakacode/react_on_rails/issues/2766$',  # Intermittent 502 from GitHub issue pages in CI
  '^https://github\.com/rack/rack/blob/main/SPEC\.rdoc$',  # Intermittent 502 from GitHub blob pages in CI
  '^https://github\.com/shakacode/shakapacker/blob/cdf32835d3e0949952b8b4b53063807f714f9b24/package/environments/base\.js(#.*)?$',  # Intermittent 502 from GitHub blob view in CI
  '^https://github\.com/K4sku$',  # Intermittent 502 from GitHub user page in CI
  '^https://github\.com/npm/cli/issues/6253$',  # Intermittent 502 from GitHub issue pages in CI
  '^https://github\.com/search\?q=gem\+react_on_rails&ref=advsearch&type=repositories&utf8=%E2%9C%93$',  # Intermittent 502 from GitHub search in CI
  '^https://github\.com/shakacode/react_on_rails/issues/1457(#.*)?$',  # Intermittent 500 from GitHub issue pages in CI
  '^https://github\.com/shakacode/react_on_rails/blob/main/react_on_rails_pro/spec/dummy/client/app/components/Loadable/routes/Routes\.imports-hmr\.jsx(#.*)?$',  # Intermittent 500 from GitHub blob pages in CI

  # ============================================================================
  # EXTERNAL DOC PAGES WITH CI CONNECTIVITY FAILURES
  # ============================================================================
  '^https://vite\.dev(/.*)?$', # Connection failed from CI
  '^https://tanstack\.com/query/latest/docs/framework/react/guides/ssr$',  # Connection failed from CI

  # ============================================================================
  # DELETED GITHUB USER ACCOUNTS (return 502/404 from CI)
  # ============================================================================
  # Contributors whose accounts no longer exist
  '^https://github\.com/(alleycat-at-git|Conturbo|jblasco3|nostophilia|pulkitkkr|railsme|samphilipd|wouldntsavezion)$',

  # ============================================================================
  # PRIVATE REPOSITORIES
  # ============================================================================
  '^https://github\.com/shakacode/react_on_rails_pro/',  # Requires authentication
]

# Exclude paths (regex patterns)
exclude_path = [
  'docs/planning/',           # Contains placeholder links
  'internal/history/',        # Archived historical snapshots; internal links intentionally frozen
  '.*/node_modules/.*',       # Dependencies
  '.*/spec/.*',               # Test fixtures
  'SUMMARY.md',               # GitBook TOC with old doc structure links (kept for redirects)
]

# Don't check fragments/anchors (can be flaky)
include_fragments = false

# Keep CI cache entries short-lived so transient external failures do not
# linger across otherwise valid PRs.
cache = true
max_cache_age = "6h"
cache_exclude_status = ["429", "500..=599"]
