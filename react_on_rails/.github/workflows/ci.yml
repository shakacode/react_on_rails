name: CI

on:
  push:
    branches: [main] # Change to match your default branch (e.g., master)
  pull_request:
    branches: [main] # Change to match your default branch (e.g., master)

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install JS dependencies
        run: npm install

      - name: Set up database
        run: bin/rails db:prepare
        env:
          RAILS_ENV: test

      - name: Build JavaScript bundles
        run: bin/shakapacker
        env:
          RAILS_ENV: test
          NODE_ENV: test

      - name: Run tests
        # Replace with `bin/rails test` if you use Minitest
        run: bundle exec rspec
        env:
          RAILS_ENV: test
