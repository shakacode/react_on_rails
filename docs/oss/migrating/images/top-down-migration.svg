<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <title>Top-Down Migration Strategy</title>
  <desc>Animated diagram of RSC migration: a single component tree transitions through three phases. Phase 1 marks the root as 'use client' (100% client). Phase 2 pushes the boundary to children (~50% client). Phase 3 keeps only interactive leaves as client (~25% client). Nodes change color from orange (client) to green (server) as the boundary moves down.</desc>
  <defs>
    <filter id="shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <style>
      .bg { fill: #F8FAFC; }
      .title { fill: #0F172A; }
      .subtitle { fill: #64748B; }
      .card { fill: white; stroke: #E2E8F0; }
      .label-text { fill: #334155; }
      .label-sub { fill: #64748B; }
      .tree-line { stroke: #CBD5E1; }
      .client-node { fill: #FFF7ED; stroke: #F97316; }
      .client-text { fill: #9A3412; }
      .server-node { fill: #ECFDF5; stroke: #22C55E; }
      .server-text { fill: #166534; }
      .badge-uc { fill: #FEE2E2; stroke: #EF4444; }
      .badge-text { fill: #991B1B; }
      .bar-bg { fill: #E2E8F0; }
      .bar-client { fill: #F97316; }
      .bar-label { fill: #9A3412; }
      .step-bg { fill: #E2E8F0; }
      .step-text { fill: #94A3B8; }
      .step-num { fill: white; }
      .step-1 { fill: #3B82F6; }
      .step-2 { fill: #F59E0B; }
      .step-3 { fill: #22C55E; }
      .step-line { stroke: #E2E8F0; }
      .phase-desc { fill: #64748B; }
      .note-box { fill: #EFF6FF; stroke: #93C5FD; }
      .note-text { fill: #1E40AF; }

      @media (prefers-color-scheme: dark) {
        .bg { fill: #0F172A; }
        .title { fill: #F1F5F9; }
        .subtitle { fill: #94A3B8; }
        .card { fill: #1E293B; stroke: #334155; }
        .label-text { fill: #CBD5E1; }
        .label-sub { fill: #94A3B8; }
        .tree-line { stroke: #475569; }
        .client-node { fill: #431407; stroke: #F97316; }
        .client-text { fill: #FDBA74; }
        .server-node { fill: #052E16; stroke: #10B981; }
        .server-text { fill: #6EE7B7; }
        .badge-uc { fill: #450A0A; stroke: #F87171; }
        .badge-text { fill: #FCA5A5; }
        .bar-bg { fill: #334155; }
        .bar-label { fill: #FDBA74; }
        .step-bg { fill: #334155; }
        .step-text { fill: #64748B; }
        .step-line { stroke: #334155; }
        .phase-desc { fill: #94A3B8; }
        .note-box { fill: #172554; stroke: #3B82F6; }
        .note-text { fill: #93C5FD; }
      }

      .p1 { opacity: 1; animation: fadeP1 18s ease infinite; }
      .p2 { opacity: 0; animation: fadeP2 18s ease infinite; }
      .p3 { opacity: 0; animation: fadeP3 18s ease infinite; }

      @keyframes fadeP1 {
        0%, 27% { opacity: 1; } 33%, 93% { opacity: 0; } 100% { opacity: 1; }
      }
      @keyframes fadeP2 {
        0%, 27% { opacity: 0; } 33%, 60% { opacity: 1; } 66%, 100% { opacity: 0; }
      }
      @keyframes fadeP3 {
        0%, 60% { opacity: 0; } 66%, 88% { opacity: 1; } 93%, 100% { opacity: 0; }
      }

      @media (prefers-reduced-motion: reduce) {
        .p1, .p2 { animation: none !important; opacity: 0 !important; }
        .p3 { animation: none !important; opacity: 1 !important; }
      }
    </style>
  </defs>

  <rect width="900" height="470" class="bg"/>
  <text x="450" y="28" text-anchor="middle" font-size="18" font-weight="700" class="title">Top-Down Migration Strategy</text>
  <text x="450" y="46" text-anchor="middle" font-size="11" class="subtitle">Watch the 'use client' boundary move from the root down to only the interactive leaves</text>

  <!-- Step indicator stepper -->
  <line x1="239" y1="74" x2="436" y2="74" class="step-line" stroke-width="2"/>
  <line x1="464" y1="74" x2="661" y2="74" class="step-line" stroke-width="2"/>
  <circle cx="225" cy="74" r="14" class="step-bg"/>
  <text x="225" y="79" text-anchor="middle" font-size="11" font-weight="700" class="step-text">1</text>
  <circle cx="450" cy="74" r="14" class="step-bg"/>
  <text x="450" y="79" text-anchor="middle" font-size="11" font-weight="700" class="step-text">2</text>
  <circle cx="675" cy="74" r="14" class="step-bg"/>
  <text x="675" y="79" text-anchor="middle" font-size="11" font-weight="700" class="step-text">3</text>
  <text x="225" y="96" text-anchor="middle" font-size="9" font-weight="600" class="label-text">Mark Root</text>
  <text x="450" y="96" text-anchor="middle" font-size="9" font-weight="600" class="label-text">Push Down</text>
  <text x="675" y="96" text-anchor="middle" font-size="9" font-weight="600" class="label-text">Split Leaves</text>

  <!-- Card -->
  <rect x="50" y="120" width="800" height="226" rx="12" class="card" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Static tree lines -->
  <g class="tree-line" stroke-width="1.5" fill="none">
    <line x1="450" y1="166" x2="450" y2="192"/>
    <line x1="450" y1="218" x2="450" y2="232"/>
    <line x1="270" y1="232" x2="630" y2="232"/>
    <line x1="270" y1="232" x2="270" y2="248"/>
    <line x1="630" y1="232" x2="630" y2="248"/>
    <line x1="270" y1="272" x2="270" y2="286"/>
    <line x1="195" y1="286" x2="345" y2="286"/>
    <line x1="195" y1="286" x2="195" y2="300"/>
    <line x1="345" y1="286" x2="345" y2="300"/>
    <line x1="630" y1="272" x2="630" y2="286"/>
    <line x1="565" y1="286" x2="695" y2="286"/>
    <line x1="565" y1="286" x2="565" y2="300"/>
    <line x1="695" y1="286" x2="695" y2="300"/>
  </g>

  <!-- Bundle bar background -->
  <rect x="230" y="360" width="440" height="10" rx="5" class="bar-bg"/>

  <!-- ============ PHASE 1: All Client ============ -->
  <g class="p1">
    <circle cx="225" cy="74" r="14" class="step-1"/>
    <text x="225" y="79" text-anchor="middle" font-size="11" font-weight="700" class="step-num">1</text>
    <text x="450" y="110" text-anchor="middle" font-size="9" class="phase-desc">Add 'use client' to root — entire tree stays client-side</text>

    <rect x="388" y="138" width="124" height="28" rx="10" class="client-node" stroke-width="2"/>
    <text x="450" y="157" text-anchor="middle" font-size="11" font-weight="600" class="client-text">App</text>
    <rect x="518" y="142" width="64" height="16" rx="8" class="badge-uc" stroke-width="1"/>
    <text x="550" y="153" text-anchor="middle" font-size="7" font-weight="700" class="badge-text">'use client'</text>

    <rect x="390" y="192" width="120" height="26" rx="8" class="client-node" stroke-width="1.5"/>
    <text x="450" y="210" text-anchor="middle" font-size="10" class="client-text">Layout</text>

    <rect x="222" y="248" width="96" height="24" rx="8" class="client-node" stroke-width="1.5"/>
    <text x="270" y="264" text-anchor="middle" font-size="10" class="client-text">Header</text>

    <rect x="556" y="248" width="148" height="24" rx="8" class="client-node" stroke-width="1.5"/>
    <text x="630" y="264" text-anchor="middle" font-size="10" class="client-text">ProductPage</text>

    <rect x="163" y="300" width="64" height="22" rx="8" class="client-node" stroke-width="1"/>
    <text x="195" y="315" text-anchor="middle" font-size="9" class="client-text">Logo</text>

    <rect x="300" y="300" width="90" height="22" rx="8" class="client-node" stroke-width="1"/>
    <text x="345" y="315" text-anchor="middle" font-size="9" class="client-text">SearchBar</text>

    <rect x="530" y="300" width="70" height="22" rx="8" class="client-node" stroke-width="1"/>
    <text x="565" y="315" text-anchor="middle" font-size="9" class="client-text">Specs</text>

    <rect x="648" y="300" width="94" height="22" rx="8" class="client-node" stroke-width="1"/>
    <text x="695" y="315" text-anchor="middle" font-size="9" class="client-text">AddCart</text>

    <rect x="230" y="360" width="440" height="10" rx="5" class="bar-client"/>
    <text x="450" y="388" text-anchor="middle" font-size="10" font-weight="600" class="bar-label">100% Client Bundle</text>
  </g>

  <!-- ============ PHASE 2: Push Boundary Down ============ -->
  <g class="p2">
    <circle cx="450" cy="74" r="14" class="step-2"/>
    <text x="450" y="79" text-anchor="middle" font-size="11" font-weight="700" class="step-num">2</text>
    <text x="450" y="110" text-anchor="middle" font-size="9" class="phase-desc">Move 'use client' to children — parent components become server-rendered</text>

    <rect x="388" y="138" width="124" height="28" rx="10" class="server-node" stroke-width="2"/>
    <text x="450" y="157" text-anchor="middle" font-size="11" font-weight="600" class="server-text">App</text>

    <rect x="390" y="192" width="120" height="26" rx="8" class="server-node" stroke-width="1.5"/>
    <text x="450" y="210" text-anchor="middle" font-size="10" class="server-text">Layout</text>

    <rect x="222" y="248" width="96" height="24" rx="8" class="server-node" stroke-width="1.5"/>
    <text x="270" y="264" text-anchor="middle" font-size="10" class="server-text">Header</text>

    <rect x="163" y="300" width="64" height="22" rx="8" class="server-node" stroke-width="1"/>
    <text x="195" y="315" text-anchor="middle" font-size="9" class="server-text">Logo</text>

    <rect x="556" y="248" width="148" height="24" rx="8" class="client-node" stroke-width="2"/>
    <text x="630" y="264" text-anchor="middle" font-size="10" class="client-text">ProductPage</text>
    <rect x="710" y="252" width="64" height="14" rx="7" class="badge-uc" stroke-width="1"/>
    <text x="742" y="262" text-anchor="middle" font-size="7" font-weight="700" class="badge-text">'use client'</text>

    <rect x="300" y="300" width="90" height="22" rx="8" class="client-node" stroke-width="2"/>
    <text x="345" y="315" text-anchor="middle" font-size="9" class="client-text">SearchBar</text>
    <rect x="396" y="304" width="64" height="14" rx="7" class="badge-uc" stroke-width="1"/>
    <text x="428" y="314" text-anchor="middle" font-size="7" font-weight="700" class="badge-text">'use client'</text>

    <rect x="530" y="300" width="70" height="22" rx="8" class="client-node" stroke-width="1"/>
    <text x="565" y="315" text-anchor="middle" font-size="9" class="client-text">Specs</text>

    <rect x="648" y="300" width="94" height="22" rx="8" class="client-node" stroke-width="1"/>
    <text x="695" y="315" text-anchor="middle" font-size="9" class="client-text">AddCart</text>

    <rect x="230" y="360" width="220" height="10" rx="5" class="bar-client"/>
    <text x="450" y="388" text-anchor="middle" font-size="10" font-weight="600" class="bar-label">~50% Client Bundle</text>
  </g>

  <!-- ============ PHASE 3: Split Leaves ============ -->
  <g class="p3">
    <circle cx="675" cy="74" r="14" class="step-3"/>
    <text x="675" y="79" text-anchor="middle" font-size="11" font-weight="700" class="step-num">3</text>
    <text x="450" y="110" text-anchor="middle" font-size="9" class="phase-desc">Only interactive leaves stay client — maximum server rendering achieved</text>

    <rect x="388" y="138" width="124" height="28" rx="10" class="server-node" stroke-width="2"/>
    <text x="450" y="157" text-anchor="middle" font-size="11" font-weight="600" class="server-text">App</text>

    <rect x="390" y="192" width="120" height="26" rx="8" class="server-node" stroke-width="1.5"/>
    <text x="450" y="210" text-anchor="middle" font-size="10" class="server-text">Layout</text>

    <rect x="222" y="248" width="96" height="24" rx="8" class="server-node" stroke-width="1.5"/>
    <text x="270" y="264" text-anchor="middle" font-size="10" class="server-text">Header</text>

    <rect x="556" y="248" width="148" height="24" rx="8" class="server-node" stroke-width="2"/>
    <text x="630" y="264" text-anchor="middle" font-size="10" class="server-text">ProductPage</text>

    <rect x="163" y="300" width="64" height="22" rx="8" class="server-node" stroke-width="1"/>
    <text x="195" y="315" text-anchor="middle" font-size="9" class="server-text">Logo</text>

    <rect x="530" y="300" width="70" height="22" rx="8" class="server-node" stroke-width="1"/>
    <text x="565" y="315" text-anchor="middle" font-size="9" class="server-text">Specs</text>

    <rect x="300" y="300" width="90" height="22" rx="8" class="client-node" stroke-width="2"/>
    <text x="345" y="315" text-anchor="middle" font-size="9" class="client-text">SearchBar</text>
    <rect x="396" y="304" width="64" height="14" rx="7" class="badge-uc" stroke-width="1"/>
    <text x="428" y="314" text-anchor="middle" font-size="7" font-weight="700" class="badge-text">'use client'</text>

    <rect x="648" y="300" width="94" height="22" rx="8" class="client-node" stroke-width="2"/>
    <text x="695" y="315" text-anchor="middle" font-size="9" class="client-text">AddCart</text>
    <rect x="748" y="304" width="64" height="14" rx="7" class="badge-uc" stroke-width="1"/>
    <text x="780" y="314" text-anchor="middle" font-size="7" font-weight="700" class="badge-text">'use client'</text>

    <rect x="230" y="360" width="110" height="10" rx="5" class="bar-client"/>
    <text x="450" y="388" text-anchor="middle" font-size="10" font-weight="600" class="bar-label">~25% Client Bundle</text>
  </g>

  <!-- Legend -->
  <rect x="140" y="404" width="14" height="14" rx="4" class="server-node" stroke-width="1.5"/>
  <text x="160" y="415" font-size="9" class="label-text">Server Component</text>
  <rect x="310" y="404" width="14" height="14" rx="4" class="client-node" stroke-width="1.5"/>
  <text x="330" y="415" font-size="9" class="label-text">Client Component</text>
  <rect x="500" y="404" width="44" height="14" rx="7" class="badge-uc" stroke-width="1"/>
  <text x="522" y="415" text-anchor="middle" font-size="7" font-weight="700" class="badge-text">'use client'</text>
  <text x="554" y="415" font-size="9" class="label-text">Directive</text>
  <rect x="680" y="404" width="30" height="14" rx="4" class="bar-client"/>
  <text x="716" y="415" font-size="9" class="label-text">Client bundle</text>

  <!-- Bottom callout -->
  <rect x="100" y="436" width="700" height="26" rx="8" class="note-box" stroke-width="1.5"/>
  <text x="450" y="453" text-anchor="middle" font-size="10" font-weight="600" class="note-text">Goal: push 'use client' to the smallest leaf components</text>
</svg>
