<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600">
  <defs>
    <style>
      /* Next.js/Vercel inspired design system */
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

      /* 10-second animation cycle */

      /* Phase indicators */
      .phase-1 { opacity: 1; animation: p1 10s ease infinite; }
      .phase-2 { opacity: 0; animation: p2 10s ease infinite; }
      .phase-3 { opacity: 0; animation: p3 10s ease infinite; }
      .phase-4 { opacity: 0; animation: p4 10s ease infinite; }

      @keyframes p1 { 0%, 15% { opacity: 1; } 16%, 100% { opacity: 0; } }
      @keyframes p2 { 0%, 15% { opacity: 0; } 16%, 45% { opacity: 1; } 46%, 100% { opacity: 0; } }
      @keyframes p3 { 0%, 45% { opacity: 0; } 46%, 75% { opacity: 1; } 76%, 100% { opacity: 0; } }
      @keyframes p4 { 0%, 75% { opacity: 0; } 76%, 100% { opacity: 1; } }

      /* Individual suspension indicators */
      .loading-reviews { opacity: 0; animation: lr 10s ease infinite; }
      .loading-recs { opacity: 0; animation: lc 10s ease infinite; }

      @keyframes lr { 0%, 15% { opacity: 0; } 16%, 45% { opacity: 1; } 46%, 100% { opacity: 0; } }
      @keyframes lc { 0%, 15% { opacity: 0; } 16%, 75% { opacity: 1; } 76%, 100% { opacity: 0; } }

      /* Checkmarks appear when loaded */
      .check-reviews { opacity: 0; animation: cr 10s ease infinite; }
      .check-recs { opacity: 0; animation: cc 10s ease infinite; }

      @keyframes cr { 0%, 45% { opacity: 0; } 46%, 100% { opacity: 1; } }
      @keyframes cc { 0%, 75% { opacity: 0; } 76%, 100% { opacity: 1; } }

      /* Step highlight */
      .step-active-1 { animation: sa1 10s ease infinite; }
      .step-active-2 { animation: sa2 10s ease infinite; }
      .step-active-3 { animation: sa3 10s ease infinite; }
      .step-active-4 { animation: sa4 10s ease infinite; }

      @keyframes sa1 { 0%, 15% { fill: #0070F3; } 16%, 100% { fill: #262626; } }
      @keyframes sa2 { 0%, 15% { fill: #262626; } 16%, 45% { fill: #0070F3; } 46%, 100% { fill: #262626; } }
      @keyframes sa3 { 0%, 45% { fill: #262626; } 46%, 75% { fill: #0070F3; } 76%, 100% { fill: #262626; } }
      @keyframes sa4 { 0%, 75% { fill: #262626; } 76%, 100% { fill: #0070F3; } }

      .spinner { animation: spin 1s linear infinite; transform-origin: center; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </defs>

  <!-- Background - Vercel dark -->
  <rect width="960" height="600" fill="#0A0A0A"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#FAFAFA" letter-spacing="-0.02em">Async Props Streaming</text>

  <!-- Step indicators - minimal pills -->
  <g transform="translate(200, 56)">
    <rect x="0" y="0" width="80" height="28" rx="14" class="step-active-1"/>
    <text x="40" y="18" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="500" fill="#FAFAFA">Start</text>

    <rect x="100" y="0" width="80" height="28" rx="14" class="step-active-2"/>
    <text x="140" y="18" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="500" fill="#FAFAFA">Loading</text>

    <rect x="200" y="0" width="80" height="28" rx="14" class="step-active-3"/>
    <text x="240" y="18" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="500" fill="#FAFAFA">Partial</text>

    <rect x="300" y="0" width="80" height="28" rx="14" class="step-active-4"/>
    <text x="340" y="18" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="500" fill="#FAFAFA">Complete</text>

    <!-- Connecting lines -->
    <line x1="80" y1="14" x2="100" y2="14" stroke="#262626" stroke-width="1"/>
    <line x1="180" y1="14" x2="200" y2="14" stroke="#262626" stroke-width="1"/>
    <line x1="280" y1="14" x2="300" y2="14" stroke="#262626" stroke-width="1"/>
  </g>

  <!-- === CODE PANEL === -->
  <g transform="translate(24, 100)">
    <!-- Panel border -->
    <rect x="0" y="0" width="440" height="240" rx="8" fill="#0A0A0A" stroke="#262626" stroke-width="1"/>

    <!-- Header -->
    <rect x="0" y="0" width="440" height="36" rx="8" fill="#171717"/>
    <rect x="0" y="28" width="440" height="8" fill="#171717"/>
    <circle cx="20" cy="18" r="5" fill="#EF4444"/>
    <circle cx="36" cy="18" r="5" fill="#F59E0B"/>
    <circle cx="52" cy="18" r="5" fill="#22C55E"/>
    <text x="220" y="22" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="500" fill="#737373">Code</text>

    <!-- Code content -->
    <g transform="translate(16, 52)">
      <!-- Rails -->
      <text x="0" y="0" font-family="ui-monospace, monospace" font-size="10" fill="#737373">// Rails</text>
      <text x="0" y="18" font-family="ui-monospace, monospace" font-size="11" fill="#A1A1AA">stream_react_component(</text>
      <text x="0" y="34" font-family="ui-monospace, monospace" font-size="11" fill="#A1A1AA">  </text>
      <text x="12" y="34" font-family="ui-monospace, monospace" font-size="11" fill="#0070F3">props:</text>
      <text x="55" y="34" font-family="ui-monospace, monospace" font-size="11" fill="#A1A1AA">{ </text>
      <text x="68" y="34" font-family="ui-monospace, monospace" font-size="11" fill="#FAFAFA">title</text>
      <text x="98" y="34" font-family="ui-monospace, monospace" font-size="11" fill="#A1A1AA">: </text>
      <text x="108" y="34" font-family="ui-monospace, monospace" font-size="11" fill="#22C55E">"Header"</text>
      <text x="168" y="34" font-family="ui-monospace, monospace" font-size="11" fill="#A1A1AA"> }</text>
      <text x="200" y="34" font-family="ui-monospace, monospace" font-size="9" fill="#0070F3">← instant</text>

      <text x="0" y="56" font-family="ui-monospace, monospace" font-size="11" fill="#A1A1AA">) { |emit|</text>
      <text x="0" y="74" font-family="ui-monospace, monospace" font-size="11" fill="#A1A1AA">  emit(</text>
      <text x="42" y="74" font-family="ui-monospace, monospace" font-size="11" fill="#22C55E">"reviews"</text>
      <text x="105" y="74" font-family="ui-monospace, monospace" font-size="11" fill="#A1A1AA">, data)</text>
      <text x="200" y="74" font-family="ui-monospace, monospace" font-size="9" fill="#737373">// after 1s</text>
      <text x="0" y="92" font-family="ui-monospace, monospace" font-size="11" fill="#A1A1AA">  emit(</text>
      <text x="42" y="92" font-family="ui-monospace, monospace" font-size="11" fill="#22C55E">"recs"</text>
      <text x="78" y="92" font-family="ui-monospace, monospace" font-size="11" fill="#A1A1AA">, data)</text>
      <text x="200" y="92" font-family="ui-monospace, monospace" font-size="9" fill="#737373">// after 3s</text>
      <text x="0" y="110" font-family="ui-monospace, monospace" font-size="11" fill="#A1A1AA">}</text>

      <!-- Divider -->
      <line x1="0" y1="124" x2="408" y2="124" stroke="#262626" stroke-width="1"/>

      <!-- React -->
      <text x="0" y="142" font-family="ui-monospace, monospace" font-size="10" fill="#737373">// React — both promises created in parallel</text>
      <text x="0" y="160" font-family="ui-monospace, monospace" font-size="11" fill="#A1A1AA">reviews = </text>
      <text x="72" y="160" font-family="ui-monospace, monospace" font-size="11" fill="#0070F3">getAsyncProp</text>
      <text x="150" y="160" font-family="ui-monospace, monospace" font-size="11" fill="#A1A1AA">(</text>
      <text x="157" y="160" font-family="ui-monospace, monospace" font-size="11" fill="#22C55E">'reviews'</text>
      <text x="218" y="160" font-family="ui-monospace, monospace" font-size="11" fill="#A1A1AA">)</text>
      <text x="0" y="178" font-family="ui-monospace, monospace" font-size="11" fill="#A1A1AA">recs    = </text>
      <text x="72" y="178" font-family="ui-monospace, monospace" font-size="11" fill="#0070F3">getAsyncProp</text>
      <text x="150" y="178" font-family="ui-monospace, monospace" font-size="11" fill="#A1A1AA">(</text>
      <text x="157" y="178" font-family="ui-monospace, monospace" font-size="11" fill="#22C55E">'recs'</text>
      <text x="195" y="178" font-family="ui-monospace, monospace" font-size="11" fill="#A1A1AA">)</text>

      <!-- Parallel indicator -->
      <path d="M -8 152 L -12 152 L -12 184 L -8 184" fill="none" stroke="#0070F3" stroke-width="1.5" opacity="0.6"/>
    </g>
  </g>

  <!-- === BROWSER PANEL === -->
  <g transform="translate(496, 100)">
    <!-- Panel border -->
    <rect x="0" y="0" width="440" height="240" rx="8" fill="#0A0A0A" stroke="#262626" stroke-width="1"/>

    <!-- Header -->
    <rect x="0" y="0" width="440" height="36" rx="8" fill="#171717"/>
    <rect x="0" y="28" width="440" height="8" fill="#171717"/>
    <circle cx="20" cy="18" r="5" fill="#EF4444"/>
    <circle cx="36" cy="18" r="5" fill="#F59E0B"/>
    <circle cx="52" cy="18" r="5" fill="#22C55E"/>
    <text x="220" y="22" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="500" fill="#737373">Browser</text>

    <!-- Content area -->
    <rect x="12" y="44" width="416" height="184" rx="6" fill="#171717"/>

    <!-- Phase 1: Waiting -->
    <g class="phase-1">
      <text x="220" y="145" text-anchor="middle" font-family="system-ui" font-size="13" fill="#525252">Waiting for server...</text>
    </g>

    <!-- Phase 2: Loading (header shown, both loading) -->
    <g class="phase-2">
      <!-- Header - instant -->
      <rect x="20" y="52" width="400" height="32" rx="4" fill="#262626"/>
      <text x="220" y="73" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="500" fill="#FAFAFA">Header</text>
      <text x="380" y="73" font-family="system-ui" font-size="10" fill="#22C55E">✓</text>

      <!-- Reviews loading -->
      <rect x="20" y="92" width="400" height="60" rx="4" fill="none" stroke="#262626" stroke-width="1" stroke-dasharray="4 2"/>
      <text x="200" y="127" text-anchor="middle" font-family="system-ui" font-size="12" fill="#525252">Reviews</text>
      <g transform="translate(260, 118)" class="loading-reviews">
        <circle cx="0" cy="0" r="8" fill="none" stroke="#0070F3" stroke-width="2" stroke-dasharray="16 8" class="spinner"/>
      </g>

      <!-- Recs loading -->
      <rect x="20" y="160" width="400" height="60" rx="4" fill="none" stroke="#262626" stroke-width="1" stroke-dasharray="4 2"/>
      <text x="200" y="195" text-anchor="middle" font-family="system-ui" font-size="12" fill="#525252">Recommendations</text>
      <g transform="translate(290, 186)" class="loading-recs">
        <circle cx="0" cy="0" r="8" fill="none" stroke="#0070F3" stroke-width="2" stroke-dasharray="16 8" class="spinner"/>
      </g>
    </g>

    <!-- Phase 3: Partial (reviews loaded) -->
    <g class="phase-3">
      <!-- Header -->
      <rect x="20" y="52" width="400" height="32" rx="4" fill="#262626"/>
      <text x="220" y="73" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="500" fill="#FAFAFA">Header</text>
      <text x="380" y="73" font-family="system-ui" font-size="10" fill="#22C55E">✓</text>

      <!-- Reviews loaded -->
      <rect x="20" y="92" width="400" height="60" rx="4" fill="#0A2540" stroke="#0070F3" stroke-width="1"/>
      <text x="200" y="120" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="500" fill="#FAFAFA">⭐⭐⭐⭐⭐ Reviews</text>
      <text x="200" y="138" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0070F3">Loaded at 1s</text>
      <text x="380" y="127" font-family="system-ui" font-size="10" fill="#22C55E">✓</text>

      <!-- Recs still loading -->
      <rect x="20" y="160" width="400" height="60" rx="4" fill="none" stroke="#262626" stroke-width="1" stroke-dasharray="4 2"/>
      <text x="200" y="195" text-anchor="middle" font-family="system-ui" font-size="12" fill="#525252">Recommendations</text>
      <g transform="translate(290, 186)" class="loading-recs">
        <circle cx="0" cy="0" r="8" fill="none" stroke="#0070F3" stroke-width="2" stroke-dasharray="16 8" class="spinner"/>
      </g>
    </g>

    <!-- Phase 4: Complete -->
    <g class="phase-4">
      <!-- Header -->
      <rect x="20" y="52" width="400" height="32" rx="4" fill="#262626"/>
      <text x="220" y="73" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="500" fill="#FAFAFA">Header</text>
      <text x="380" y="73" font-family="system-ui" font-size="10" fill="#22C55E">✓</text>

      <!-- Reviews loaded -->
      <rect x="20" y="92" width="400" height="60" rx="4" fill="#0A2540" stroke="#0070F3" stroke-width="1"/>
      <text x="200" y="120" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="500" fill="#FAFAFA">⭐⭐⭐⭐⭐ Reviews</text>
      <text x="200" y="138" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0070F3">Loaded at 1s</text>
      <text x="380" y="127" font-family="system-ui" font-size="10" fill="#22C55E">✓</text>

      <!-- Recs loaded -->
      <rect x="20" y="160" width="400" height="60" rx="4" fill="#0A2540" stroke="#0070F3" stroke-width="1"/>
      <text x="200" y="188" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="500" fill="#FAFAFA">🎯 Recommendations</text>
      <text x="200" y="206" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0070F3">Loaded at 3s</text>
      <text x="380" y="195" font-family="system-ui" font-size="10" fill="#22C55E">✓</text>
    </g>
  </g>

  <!-- === TIMELINE === -->
  <g transform="translate(24, 360)">
    <rect x="0" y="0" width="912" height="220" rx="8" fill="#0A0A0A" stroke="#262626" stroke-width="1"/>

    <text x="456" y="28" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="600" fill="#FAFAFA">How It Works</text>

    <!-- Timeline bar -->
    <g transform="translate(56, 56)">
      <line x1="0" y1="20" x2="800" y2="20" stroke="#262626" stroke-width="2"/>

      <!-- 0s -->
      <circle cx="0" cy="20" r="6" fill="#262626" stroke="#525252" stroke-width="1"/>
      <text x="0" y="48" text-anchor="middle" font-family="ui-monospace" font-size="10" fill="#525252">0s</text>
      <text x="0" y="62" text-anchor="middle" font-family="system-ui" font-size="10" fill="#737373">Start</text>

      <!-- Instant: Header -->
      <circle cx="50" cy="20" r="6" fill="#22C55E"/>
      <text x="50" y="6" text-anchor="middle" font-family="system-ui" font-size="10" fill="#22C55E">Header ✓</text>
      <text x="50" y="48" text-anchor="middle" font-family="ui-monospace" font-size="9" fill="#525252">instant</text>

      <!-- 1s: Reviews -->
      <circle cx="300" cy="20" r="6" fill="#0070F3"/>
      <text x="300" y="6" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0070F3">Reviews ✓</text>
      <text x="300" y="48" text-anchor="middle" font-family="ui-monospace" font-size="10" fill="#525252">1s</text>

      <!-- 3s: Recs -->
      <circle cx="700" cy="20" r="6" fill="#0070F3"/>
      <text x="700" y="6" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0070F3">Recs ✓</text>
      <text x="700" y="48" text-anchor="middle" font-family="ui-monospace" font-size="10" fill="#525252">3s</text>

      <!-- Loading indicators on timeline -->
      <g class="loading-reviews">
        <line x1="50" y1="20" x2="300" y2="20" stroke="#0070F3" stroke-width="2" stroke-dasharray="4 4" opacity="0.5"/>
      </g>
      <g class="loading-recs">
        <line x1="50" y1="20" x2="700" y2="20" stroke="#0070F3" stroke-width="2" stroke-dasharray="4 4" opacity="0.3"/>
      </g>
    </g>

    <!-- Key points -->
    <g transform="translate(56, 140)">
      <g>
        <rect x="0" y="0" width="260" height="56" rx="6" fill="#171717"/>
        <text x="16" y="22" font-family="system-ui" font-size="11" font-weight="500" fill="#FAFAFA">Parallel Promises</text>
        <text x="16" y="42" font-family="system-ui" font-size="10" fill="#525252">Both start waiting immediately</text>
      </g>
      <g transform="translate(276, 0)">
        <rect x="0" y="0" width="260" height="56" rx="6" fill="#171717"/>
        <text x="16" y="22" font-family="system-ui" font-size="11" font-weight="500" fill="#FAFAFA">Independent Suspense</text>
        <text x="16" y="42" font-family="system-ui" font-size="10" fill="#525252">Each boundary fills when ready</text>
      </g>
      <g transform="translate(552, 0)">
        <rect x="0" y="0" width="260" height="56" rx="6" fill="#171717"/>
        <text x="16" y="22" font-family="system-ui" font-size="11" font-weight="500" fill="#FAFAFA">First Wins</text>
        <text x="16" y="42" font-family="system-ui" font-size="10" fill="#525252">No waiting for slowest query</text>
      </g>
    </g>
  </g>
</svg>
