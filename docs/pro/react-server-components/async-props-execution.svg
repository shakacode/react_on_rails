<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="railsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CC0000"/>
      <stop offset="100%" style="stop-color:#990000"/>
    </linearGradient>
    <linearGradient id="reactGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#61DAFB"/>
      <stop offset="100%" style="stop-color:#21A0C8"/>
    </linearGradient>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9"/>
      <stop offset="100%" style="stop-color:#2E5A8A"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>

    <style>
      /* Theme colors - Light mode default */
      .bg { fill: #F8FAFC; }
      .card { fill: white; stroke: #E2E8F0; }
      .card-inner { fill: #F1F5F9; }
      .title { fill: #0F172A; }
      .subtitle { fill: #64748B; }
      .text-primary { fill: #475569; }
      .text-secondary { fill: #64748B; }
      .text-code { fill: #0F172A; }
      .text-keyword { fill: #0891B2; }
      .text-string { fill: #16A34A; }
      .text-label { fill: #DC2626; }
      .step-inactive { fill: #E2E8F0; }
      .step-text { fill: #1E293B; }
      .divider { stroke: #E2E8F0; }
      .loading-box { fill: white; stroke: #FCD34D; }
      .loading-text { fill: #92400E; }
      .loaded-box { fill: #D1FAE5; stroke: #22C55E; }
      .loaded-text { fill: #166534; }
      .loaded-sub { fill: #15803D; }
      .header-box { fill: #DBEAFE; stroke: #93C5FD; }
      .header-text { fill: #1E40AF; }
      .timeline-bar { fill: #E2E8F0; }
      .check-bg { fill: #22C55E; }
      .check-text { fill: white; }
      .benefit-text { fill: #334155; }

      @media (prefers-color-scheme: dark) {
        .bg { fill: #0F172A; }
        .card { fill: #1E293B; stroke: #334155; }
        .card-inner { fill: #0F172A; }
        .title { fill: #F1F5F9; }
        .subtitle { fill: #94A3B8; }
        .text-primary { fill: #CBD5E1; }
        .text-secondary { fill: #94A3B8; }
        .text-code { fill: #F1F5F9; }
        .text-keyword { fill: #67E8F9; }
        .text-string { fill: #4ADE80; }
        .text-label { fill: #F87171; }
        .step-inactive { fill: #334155; }
        .step-text { fill: #E2E8F0; }
        .divider { stroke: #334155; }
        .loading-box { fill: #1E293B; stroke: #FBBF24; }
        .loading-text { fill: #FCD34D; }
        .loaded-box { fill: #064E3B; stroke: #10B981; }
        .loaded-text { fill: #6EE7B7; }
        .loaded-sub { fill: #34D399; }
        .header-box { fill: #1E3A5F; stroke: #3B82F6; }
        .header-text { fill: #93C5FD; }
        .timeline-bar { fill: #334155; }
        .check-bg { fill: #10B981; }
        .benefit-text { fill: #E2E8F0; }
      }

      /* Phase animations - 10 second cycle */
      .phase-1 { opacity: 1; animation: p1 10s ease infinite; }
      .phase-2 { opacity: 0; animation: p2 10s ease infinite; }
      .phase-3 { opacity: 0; animation: p3 10s ease infinite; }
      .phase-4 { opacity: 0; animation: p4 10s ease infinite; }

      @keyframes p1 { 0%, 15% { opacity: 1; } 16%, 100% { opacity: 0; } }
      @keyframes p2 { 0%, 15% { opacity: 0; } 16%, 45% { opacity: 1; } 46%, 100% { opacity: 0; } }
      @keyframes p3 { 0%, 45% { opacity: 0; } 46%, 75% { opacity: 1; } 76%, 100% { opacity: 0; } }
      @keyframes p4 { 0%, 75% { opacity: 0; } 76%, 100% { opacity: 1; } }

      /* Step pill highlights */
      .step-1 { animation: s1 10s ease infinite; }
      .step-2 { animation: s2 10s ease infinite; }
      .step-3 { animation: s3 10s ease infinite; }
      .step-4 { animation: s4 10s ease infinite; }
      @keyframes s1 { 0%, 15% { fill: #3B82F6; } 16%, 100% { fill: #E2E8F0; } }
      @keyframes s2 { 0%, 15% { fill: #E2E8F0; } 16%, 45% { fill: #3B82F6; } 46%, 100% { fill: #E2E8F0; } }
      @keyframes s3 { 0%, 45% { fill: #E2E8F0; } 46%, 75% { fill: #3B82F6; } 76%, 100% { fill: #E2E8F0; } }
      @keyframes s4 { 0%, 75% { fill: #E2E8F0; } 76%, 100% { fill: #3B82F6; } }

      /* Spinner rotation */
      .spinner {
        animation: spin 1s linear infinite;
        transform-box: fill-box;
        transform-origin: center;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" class="bg"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" class="title">Async Props: Independent Streaming</text>
  <text x="450" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" class="subtitle">Each Suspense boundary fills when its data arrives</text>

  <!-- Phase pills -->
  <g transform="translate(250, 68)">
    <rect x="0" y="0" width="70" height="24" rx="12" class="step-1"/>
    <text x="35" y="16" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="500" class="step-text">Start</text>

    <rect x="85" y="0" width="70" height="24" rx="12" class="step-2"/>
    <text x="120" y="16" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="500" class="step-text">Loading</text>

    <rect x="170" y="0" width="70" height="24" rx="12" class="step-3"/>
    <text x="205" y="16" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="500" class="step-text">Partial</text>

    <rect x="255" y="0" width="70" height="24" rx="12" class="step-4"/>
    <text x="290" y="16" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="500" class="step-text">Complete</text>
  </g>

  <!-- === CODE PANEL === -->
  <g transform="translate(20, 105)">
    <rect x="0" y="0" width="420" height="210" rx="12" class="card" stroke-width="2" filter="url(#shadow)"/>
    <rect x="0" y="0" width="420" height="36" rx="12" fill="url(#railsGrad)"/>
    <rect x="0" y="24" width="420" height="12" fill="url(#railsGrad)"/>
    <text x="210" y="24" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="white">Code</text>

    <g transform="translate(16, 48)">
      <text x="0" y="12" font-family="ui-monospace, monospace" font-size="10" class="text-secondary">// Rails — emit async props</text>
      <text x="0" y="30" font-family="ui-monospace, monospace" font-size="11" class="text-primary">stream_component(</text>
      <text x="10" y="46" font-family="ui-monospace, monospace" font-size="11" class="text-keyword">props:</text>
      <text x="55" y="46" font-family="ui-monospace, monospace" font-size="11" class="text-primary">{ </text>
      <text x="68" y="46" font-family="ui-monospace, monospace" font-size="11" class="text-code">title</text>
      <text x="98" y="46" font-family="ui-monospace, monospace" font-size="11" class="text-primary">: </text>
      <text x="108" y="46" font-family="ui-monospace, monospace" font-size="11" class="text-string">"Header"</text>
      <text x="168" y="46" font-family="ui-monospace, monospace" font-size="11" class="text-primary"> }</text>
      <text x="200" y="46" font-family="ui-monospace, monospace" font-size="9" class="text-label">← sync (instant)</text>

      <text x="0" y="64" font-family="ui-monospace, monospace" font-size="11" class="text-primary">) { |emit|</text>
      <text x="10" y="80" font-family="ui-monospace, monospace" font-size="11" class="text-primary">emit(</text>
      <text x="45" y="80" font-family="ui-monospace, monospace" font-size="11" class="text-string">"reviews"</text>
      <text x="110" y="80" font-family="ui-monospace, monospace" font-size="11" class="text-primary">, data)</text>
      <text x="200" y="80" font-family="ui-monospace, monospace" font-size="9" class="text-secondary">// after 1s</text>
      <text x="10" y="96" font-family="ui-monospace, monospace" font-size="11" class="text-primary">emit(</text>
      <text x="45" y="96" font-family="ui-monospace, monospace" font-size="11" class="text-string">"recs"</text>
      <text x="82" y="96" font-family="ui-monospace, monospace" font-size="11" class="text-primary">, data)</text>
      <text x="200" y="96" font-family="ui-monospace, monospace" font-size="9" class="text-secondary">// after 3s</text>
      <text x="0" y="112" font-family="ui-monospace, monospace" font-size="11" class="text-primary">}</text>

      <line x1="0" y1="124" x2="388" y2="124" class="divider" stroke-width="1"/>

      <text x="0" y="142" font-family="ui-monospace, monospace" font-size="10" class="text-secondary">// React — both promises start immediately</text>
      <text x="0" y="158" font-family="ui-monospace, monospace" font-size="11" class="text-primary">reviews = </text>
      <text x="72" y="158" font-family="ui-monospace, monospace" font-size="11" class="text-keyword">getAsyncProp</text>
      <text x="150" y="158" font-family="ui-monospace, monospace" font-size="11" class="text-primary">(</text>
      <text x="157" y="158" font-family="ui-monospace, monospace" font-size="11" class="text-string">'reviews'</text>
      <text x="218" y="158" font-family="ui-monospace, monospace" font-size="11" class="text-primary">)</text>
      <text x="0" y="174" font-family="ui-monospace, monospace" font-size="11" class="text-primary">recs    = </text>
      <text x="72" y="174" font-family="ui-monospace, monospace" font-size="11" class="text-keyword">getAsyncProp</text>
      <text x="150" y="174" font-family="ui-monospace, monospace" font-size="11" class="text-primary">(</text>
      <text x="157" y="174" font-family="ui-monospace, monospace" font-size="11" class="text-string">'recs'</text>
      <text x="195" y="174" font-family="ui-monospace, monospace" font-size="11" class="text-primary">)</text>

      <path d="M -6 150 L -10 150 L -10 180 L -6 180" fill="none" stroke="#3B82F6" stroke-width="1.5"/>
      <text x="235" y="166" font-family="ui-monospace, monospace" font-size="9" fill="#3B82F6">parallel!</text>
    </g>
  </g>

  <!-- === BROWSER PANEL === -->
  <g transform="translate(460, 105)">
    <rect x="0" y="0" width="420" height="210" rx="12" class="card" stroke-width="2" filter="url(#shadow)"/>
    <rect x="0" y="0" width="420" height="36" rx="12" fill="url(#browserGrad)"/>
    <rect x="0" y="24" width="420" height="12" fill="url(#browserGrad)"/>
    <circle cx="20" cy="18" r="5" fill="#EF4444"/>
    <circle cx="36" cy="18" r="5" fill="#F59E0B"/>
    <circle cx="52" cy="18" r="5" fill="#22C55E"/>
    <text x="210" y="24" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="white">Browser</text>

    <rect x="12" y="44" width="396" height="154" rx="8" class="card-inner"/>

    <!-- Phase 1: Waiting -->
    <g class="phase-1">
      <text x="210" y="130" text-anchor="middle" font-family="system-ui" font-size="14" class="subtitle">Waiting for server...</text>
    </g>

    <!-- Phase 2: Both Loading -->
    <g class="phase-2">
      <!-- Header loaded -->
      <rect x="20" y="52" width="380" height="28" rx="6" class="header-box" stroke-width="1"/>
      <text x="200" y="71" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="500" class="header-text">Header</text>
      <text x="360" y="71" font-family="system-ui" font-size="10" fill="#16A34A">✓</text>

      <!-- Reviews loading -->
      <rect x="20" y="88" width="380" height="48" rx="6" class="loading-box" stroke-width="2" stroke-dasharray="6 3"/>
      <text x="180" y="117" text-anchor="middle" font-family="system-ui" font-size="12" class="loading-text">Reviews</text>
      <g transform="translate(240, 112)">
        <circle cx="0" cy="0" r="7" fill="none" stroke="#F59E0B" stroke-width="2" stroke-dasharray="14 7" class="spinner"/>
      </g>

      <!-- Recs loading -->
      <rect x="20" y="144" width="380" height="48" rx="6" class="loading-box" stroke-width="2" stroke-dasharray="6 3"/>
      <text x="160" y="173" text-anchor="middle" font-family="system-ui" font-size="12" class="loading-text">Recommendations</text>
      <g transform="translate(270, 168)">
        <circle cx="0" cy="0" r="7" fill="none" stroke="#F59E0B" stroke-width="2" stroke-dasharray="14 7" class="spinner"/>
      </g>
    </g>

    <!-- Phase 3: Reviews loaded, Recs loading -->
    <g class="phase-3">
      <!-- Header loaded -->
      <rect x="20" y="52" width="380" height="28" rx="6" class="header-box" stroke-width="1"/>
      <text x="200" y="71" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="500" class="header-text">Header</text>
      <text x="360" y="71" font-family="system-ui" font-size="10" fill="#16A34A">✓</text>

      <!-- Reviews LOADED -->
      <rect x="20" y="88" width="380" height="48" rx="6" class="loaded-box" stroke-width="2"/>
      <text x="200" y="110" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="500" class="loaded-text">⭐⭐⭐⭐⭐ Reviews</text>
      <text x="200" y="126" text-anchor="middle" font-family="system-ui" font-size="10" class="loaded-sub">Loaded at 1s</text>
      <text x="360" y="112" font-family="system-ui" font-size="10" fill="#16A34A">✓</text>

      <!-- Recs still loading -->
      <rect x="20" y="144" width="380" height="48" rx="6" class="loading-box" stroke-width="2" stroke-dasharray="6 3"/>
      <text x="160" y="173" text-anchor="middle" font-family="system-ui" font-size="12" class="loading-text">Recommendations</text>
      <g transform="translate(270, 168)">
        <circle cx="0" cy="0" r="7" fill="none" stroke="#F59E0B" stroke-width="2" stroke-dasharray="14 7" class="spinner"/>
      </g>
    </g>

    <!-- Phase 4: All loaded -->
    <g class="phase-4">
      <!-- Header loaded -->
      <rect x="20" y="52" width="380" height="28" rx="6" class="header-box" stroke-width="1"/>
      <text x="200" y="71" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="500" class="header-text">Header</text>
      <text x="360" y="71" font-family="system-ui" font-size="10" fill="#16A34A">✓</text>

      <!-- Reviews LOADED -->
      <rect x="20" y="88" width="380" height="48" rx="6" class="loaded-box" stroke-width="2"/>
      <text x="200" y="110" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="500" class="loaded-text">⭐⭐⭐⭐⭐ Reviews</text>
      <text x="200" y="126" text-anchor="middle" font-family="system-ui" font-size="10" class="loaded-sub">Loaded at 1s</text>
      <text x="360" y="112" font-family="system-ui" font-size="10" fill="#16A34A">✓</text>

      <!-- Recs LOADED -->
      <rect x="20" y="144" width="380" height="48" rx="6" class="loaded-box" stroke-width="2"/>
      <text x="200" y="166" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="500" class="loaded-text">🎯 Recommendations</text>
      <text x="200" y="182" text-anchor="middle" font-family="system-ui" font-size="10" class="loaded-sub">Loaded at 3s</text>
      <text x="360" y="168" font-family="system-ui" font-size="10" fill="#16A34A">✓</text>
    </g>
  </g>

  <!-- === TIMELINE === -->
  <g transform="translate(20, 335)">
    <rect x="0" y="0" width="860" height="165" rx="12" class="card" stroke-width="2" filter="url(#shadow)"/>

    <text x="430" y="28" text-anchor="middle" font-family="system-ui" font-size="15" font-weight="600" class="title">Timeline: What the User Sees</text>

    <g transform="translate(60, 50)">
      <rect x="0" y="16" width="740" height="8" rx="4" class="timeline-bar"/>

      <rect x="0" y="16" width="50" height="8" rx="4" fill="#FCA5A5"/>
      <rect x="50" y="16" width="200" height="8" fill="#67E8F9"/>
      <rect x="250" y="16" width="300" height="8" fill="#FCD34D"/>
      <rect x="550" y="16" width="190" height="8" rx="4" fill="#86EFAC"/>

      <g transform="translate(0, 0)">
        <circle cx="0" cy="20" r="8" fill="#DC2626" stroke="white" stroke-width="2"/>
        <text x="0" y="50" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" class="text-primary">0s</text>
        <text x="0" y="64" text-anchor="middle" font-family="system-ui" font-size="10" class="text-secondary">Start</text>
      </g>

      <g transform="translate(50, 0)">
        <circle cx="0" cy="20" r="8" fill="#16A34A" stroke="white" stroke-width="2"/>
        <text x="0" y="6" text-anchor="middle" font-family="system-ui" font-size="10" fill="#16A34A">Header ✓</text>
        <text x="0" y="50" text-anchor="middle" font-family="system-ui" font-size="10" class="text-secondary">instant</text>
      </g>

      <g transform="translate(250, 0)">
        <circle cx="0" cy="20" r="8" fill="#0891B2" stroke="white" stroke-width="2"/>
        <text x="0" y="6" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0891B2">Reviews ✓</text>
        <text x="0" y="50" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" class="text-primary">1s</text>
      </g>

      <g transform="translate(550, 0)">
        <circle cx="0" cy="20" r="8" fill="#0891B2" stroke="white" stroke-width="2"/>
        <text x="0" y="6" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0891B2">Recs ✓</text>
        <text x="0" y="50" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" class="text-primary">3s</text>
      </g>
    </g>

    <g transform="translate(40, 115)">
      <g>
        <circle cx="10" cy="10" r="10" class="check-bg"/>
        <text x="10" y="14" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" class="check-text">✓</text>
        <text x="28" y="14" font-family="system-ui" font-size="12" class="benefit-text">Parallel Promises — both start immediately</text>
      </g>
      <g transform="translate(300, 0)">
        <circle cx="10" cy="10" r="10" class="check-bg"/>
        <text x="10" y="14" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" class="check-text">✓</text>
        <text x="28" y="14" font-family="system-ui" font-size="12" class="benefit-text">Independent Suspense — each fills when ready</text>
      </g>
      <g transform="translate(620, 0)">
        <circle cx="10" cy="10" r="10" class="check-bg"/>
        <text x="10" y="14" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" class="check-text">✓</text>
        <text x="28" y="14" font-family="system-ui" font-size="12" class="benefit-text">First Wins — no waiting</text>
      </g>
    </g>
  </g>
</svg>
