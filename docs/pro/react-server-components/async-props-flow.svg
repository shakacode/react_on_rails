<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780">
  <defs>
    <!-- Gradients -->
    <linearGradient id="railsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CC0000"/>
      <stop offset="100%" style="stop-color:#990000"/>
    </linearGradient>
    <linearGradient id="reactGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#61DAFB"/>
      <stop offset="100%" style="stop-color:#21A0C8"/>
    </linearGradient>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9"/>
      <stop offset="100%" style="stop-color:#2E5A8A"/>
    </linearGradient>

    <!-- Arrow markers -->
    <marker id="arrowHead" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#64748B"/>
    </marker>

    <!-- Drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="780" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#0F172A">How Async Props Work in React on Rails</text>
  <text x="550" y="68" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" fill="#64748B">Streaming slow data while keeping the page interactive</text>

  <!-- === RAILS SECTION === -->
  <g transform="translate(50, 100)">
    <!-- Rails box -->
    <rect x="0" y="0" width="300" height="250" rx="12" fill="white" stroke="#E2E8F0" stroke-width="2" filter="url(#shadow)"/>
    <rect x="0" y="0" width="300" height="44" rx="12" fill="url(#railsGrad)"/>
    <rect x="0" y="32" width="300" height="12" fill="url(#railsGrad)"/>
    <text x="150" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="white">🛤️ Rails Server</text>

    <!-- Step 1 -->
    <g transform="translate(15, 58)">
      <rect x="0" y="0" width="270" height="52" rx="8" fill="#FEF2F2" stroke="#FECACA" stroke-width="1.5"/>
      <circle cx="22" cy="26" r="14" fill="#DC2626"/>
      <text x="22" y="31" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white">1</text>
      <text x="48" y="22" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#991B1B">Controller prepares data</text>
      <text x="48" y="40" font-family="ui-monospace, monospace" font-size="11" fill="#7F1D1D">@posts = Post.limit(20)</text>
    </g>

    <!-- Step 2 -->
    <g transform="translate(15, 120)">
      <rect x="0" y="0" width="270" height="52" rx="8" fill="#FEF2F2" stroke="#FECACA" stroke-width="1.5"/>
      <circle cx="22" cy="26" r="14" fill="#DC2626"/>
      <text x="22" y="31" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white">2</text>
      <text x="48" y="22" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#991B1B">View calls stream helper</text>
      <text x="48" y="40" font-family="ui-monospace, monospace" font-size="10" fill="#7F1D1D">stream_react_component_with_async_props</text>
    </g>

    <!-- Step 3 -->
    <g transform="translate(15, 182)">
      <rect x="0" y="0" width="270" height="52" rx="8" fill="#FEF2F2" stroke="#FECACA" stroke-width="1.5"/>
      <circle cx="22" cy="26" r="14" fill="#DC2626"/>
      <text x="22" y="31" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white">3</text>
      <text x="48" y="22" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#991B1B">Emit slow props when ready</text>
      <text x="48" y="40" font-family="ui-monospace, monospace" font-size="11" fill="#7F1D1D">emit.call("slowData", data)</text>
    </g>
  </g>

  <!-- Arrow: Rails to React -->
  <g transform="translate(360, 225)">
    <path d="M 0 0 L 50 0" stroke="#94A3B8" stroke-width="3" marker-end="url(#arrowHead)" fill="none"/>
  </g>

  <!-- === REACT SERVER SECTION === -->
  <g transform="translate(400, 100)">
    <!-- React box -->
    <rect x="0" y="0" width="300" height="250" rx="12" fill="white" stroke="#E2E8F0" stroke-width="2" filter="url(#shadow)"/>
    <rect x="0" y="0" width="300" height="44" rx="12" fill="url(#reactGrad)"/>
    <rect x="0" y="32" width="300" height="12" fill="url(#reactGrad)"/>
    <text x="150" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="white">⚛️ React Server (Node)</text>

    <!-- Step 4 -->
    <g transform="translate(15, 58)">
      <rect x="0" y="0" width="270" height="52" rx="8" fill="#ECFEFF" stroke="#A5F3FC" stroke-width="1.5"/>
      <circle cx="22" cy="26" r="14" fill="#0891B2"/>
      <text x="22" y="31" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white">4</text>
      <text x="48" y="22" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#155E75">Start rendering immediately</text>
      <text x="48" y="40" font-family="ui-monospace, monospace" font-size="11" fill="#164E63">renderToPipeableStream()</text>
    </g>

    <!-- Step 5 -->
    <g transform="translate(15, 120)">
      <rect x="0" y="0" width="270" height="52" rx="8" fill="#ECFEFF" stroke="#A5F3FC" stroke-width="1.5"/>
      <circle cx="22" cy="26" r="14" fill="#0891B2"/>
      <text x="22" y="31" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white">5</text>
      <text x="48" y="22" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#155E75">Component gets Promise</text>
      <text x="48" y="40" font-family="ui-monospace, monospace" font-size="10" fill="#164E63">getReactOnRailsAsyncProp('slowData')</text>
    </g>

    <!-- Step 6 -->
    <g transform="translate(15, 182)">
      <rect x="0" y="0" width="270" height="52" rx="8" fill="#ECFEFF" stroke="#A5F3FC" stroke-width="1.5"/>
      <circle cx="22" cy="26" r="14" fill="#0891B2"/>
      <text x="22" y="31" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white">6</text>
      <text x="48" y="22" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#155E75">Wrap in Suspense boundary</text>
      <text x="48" y="40" font-family="ui-monospace, monospace" font-size="11" fill="#164E63">&lt;Suspense fallback={...}&gt;</text>
    </g>
  </g>

  <!-- Arrow: React to Browser -->
  <g transform="translate(710, 225)">
    <path d="M 0 0 L 50 0" stroke="#94A3B8" stroke-width="3" marker-end="url(#arrowHead)" fill="none"/>
  </g>

  <!-- === BROWSER SECTION === -->
  <g transform="translate(750, 100)">
    <!-- Browser box -->
    <rect x="0" y="0" width="300" height="250" rx="12" fill="white" stroke="#E2E8F0" stroke-width="2" filter="url(#shadow)"/>
    <rect x="0" y="0" width="300" height="44" rx="12" fill="url(#browserGrad)"/>
    <rect x="0" y="32" width="300" height="12" fill="url(#browserGrad)"/>
    <text x="150" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="white">🌐 Browser</text>

    <!-- Step 7 -->
    <g transform="translate(15, 58)">
      <rect x="0" y="0" width="270" height="52" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
      <circle cx="22" cy="26" r="14" fill="#2563EB"/>
      <text x="22" y="31" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white">7</text>
      <text x="48" y="22" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1E40AF">Shows page + fallbacks</text>
      <text x="48" y="40" font-family="system-ui, sans-serif" font-size="11" fill="#1E3A8A">Fast content visible, "Loading..."</text>
    </g>

    <!-- Step 8 -->
    <g transform="translate(15, 120)">
      <rect x="0" y="0" width="270" height="52" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5"/>
      <circle cx="22" cy="26" r="14" fill="#16A34A"/>
      <text x="22" y="31" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white">8</text>
      <text x="48" y="22" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#166534">Promise resolves</text>
      <text x="48" y="40" font-family="system-ui, sans-serif" font-size="11" fill="#14532D">Rails emitted data arrives</text>
    </g>

    <!-- Step 9 -->
    <g transform="translate(15, 182)">
      <rect x="0" y="0" width="270" height="52" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5"/>
      <circle cx="22" cy="26" r="14" fill="#16A34A"/>
      <text x="22" y="31" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white">9</text>
      <text x="48" y="22" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#166534">Fallback swapped</text>
      <text x="48" y="40" font-family="system-ui, sans-serif" font-size="11" fill="#14532D">Real content replaces "Loading..."</text>
    </g>
  </g>

  <!-- === TIMELINE SECTION === -->
  <g transform="translate(50, 380)">
    <text x="500" y="0" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#1E293B">Timeline: What the User Sees</text>

    <!-- Timeline bar -->
    <rect x="50" y="30" width="900" height="10" rx="5" fill="#E2E8F0"/>

    <!-- Colored progress sections -->
    <rect x="50" y="30" width="200" height="10" rx="5" fill="#FCA5A5"/>
    <rect x="250" y="30" width="250" height="10" fill="#67E8F9"/>
    <rect x="500" y="30" width="250" height="10" fill="#FCD34D"/>
    <rect x="750" y="30" width="200" height="10" rx="5" fill="#86EFAC"/>

    <!-- Time markers and browser mockups -->

    <!-- T0: Request -->
    <g transform="translate(50, 55)">
      <circle cx="0" cy="0" r="10" fill="#DC2626" stroke="white" stroke-width="2"/>
      <text x="0" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#475569">T₀</text>
      <text x="0" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748B">Request</text>

      <!-- Browser mockup -->
      <g transform="translate(-70, 60)">
        <rect x="0" y="0" width="140" height="100" rx="8" fill="white" stroke="#CBD5E1" stroke-width="2"/>
        <rect x="0" y="0" width="140" height="22" rx="8" fill="#F1F5F9"/>
        <rect x="0" y="14" width="140" height="8" fill="#F1F5F9"/>
        <circle cx="14" cy="11" r="4" fill="#EF4444"/>
        <circle cx="28" cy="11" r="4" fill="#F59E0B"/>
        <circle cx="42" cy="11" r="4" fill="#22C55E"/>
        <rect x="15" y="35" width="110" height="50" rx="4" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
        <text x="70" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94A3B8">Blank</text>
      </g>
    </g>

    <!-- T1: Fast props arrive -->
    <g transform="translate(300, 55)">
      <circle cx="0" cy="0" r="10" fill="#0891B2" stroke="white" stroke-width="2"/>
      <text x="0" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#475569">T₁</text>
      <text x="0" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748B">Fast props</text>

      <!-- Browser mockup -->
      <g transform="translate(-70, 60)">
        <rect x="0" y="0" width="140" height="100" rx="8" fill="white" stroke="#CBD5E1" stroke-width="2"/>
        <rect x="0" y="0" width="140" height="22" rx="8" fill="#F1F5F9"/>
        <rect x="0" y="14" width="140" height="8" fill="#F1F5F9"/>
        <circle cx="14" cy="11" r="4" fill="#EF4444"/>
        <circle cx="28" cy="11" r="4" fill="#F59E0B"/>
        <circle cx="42" cy="11" r="4" fill="#22C55E"/>
        <!-- Header -->
        <rect x="10" y="30" width="120" height="20" rx="4" fill="#DBEAFE"/>
        <text x="70" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1E40AF">Header ✓</text>
        <!-- Loading -->
        <rect x="10" y="55" width="120" height="35" rx="4" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5" stroke-dasharray="4,2"/>
        <text x="70" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#92400E">Loading...</text>
      </g>
    </g>

    <!-- T2: Slow prop emitted -->
    <g transform="translate(600, 55)">
      <circle cx="0" cy="0" r="10" fill="#F59E0B" stroke="white" stroke-width="2"/>
      <text x="0" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#475569">T₂</text>
      <text x="0" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748B">Slow prop</text>

      <!-- Browser mockup -->
      <g transform="translate(-70, 60)">
        <rect x="0" y="0" width="140" height="100" rx="8" fill="white" stroke="#CBD5E1" stroke-width="2"/>
        <rect x="0" y="0" width="140" height="22" rx="8" fill="#F1F5F9"/>
        <rect x="0" y="14" width="140" height="8" fill="#F1F5F9"/>
        <circle cx="14" cy="11" r="4" fill="#EF4444"/>
        <circle cx="28" cy="11" r="4" fill="#F59E0B"/>
        <circle cx="42" cy="11" r="4" fill="#22C55E"/>
        <!-- Header -->
        <rect x="10" y="30" width="120" height="20" rx="4" fill="#DBEAFE"/>
        <text x="70" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1E40AF">Header ✓</text>
        <!-- Streaming in -->
        <rect x="10" y="55" width="120" height="35" rx="4" fill="#FEF9C3" stroke="#FACC15" stroke-width="2"/>
        <text x="70" y="73" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#854D0E">Streaming...</text>
        <text x="70" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#A16207">▸▸▸</text>
      </g>
    </g>

    <!-- T3: Complete -->
    <g transform="translate(900, 55)">
      <circle cx="0" cy="0" r="10" fill="#16A34A" stroke="white" stroke-width="2"/>
      <text x="0" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#475569">T₃</text>
      <text x="0" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748B">Complete</text>

      <!-- Browser mockup -->
      <g transform="translate(-70, 60)">
        <rect x="0" y="0" width="140" height="100" rx="8" fill="white" stroke="#CBD5E1" stroke-width="2"/>
        <rect x="0" y="0" width="140" height="22" rx="8" fill="#F1F5F9"/>
        <rect x="0" y="14" width="140" height="8" fill="#F1F5F9"/>
        <circle cx="14" cy="11" r="4" fill="#EF4444"/>
        <circle cx="28" cy="11" r="4" fill="#F59E0B"/>
        <circle cx="42" cy="11" r="4" fill="#22C55E"/>
        <!-- Header -->
        <rect x="10" y="30" width="120" height="20" rx="4" fill="#DBEAFE"/>
        <text x="70" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1E40AF">Header ✓</text>
        <!-- Content loaded -->
        <rect x="10" y="55" width="120" height="35" rx="4" fill="#D1FAE5" stroke="#22C55E" stroke-width="2"/>
        <text x="70" y="73" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#166534">Slow Data ✓</text>
        <text x="70" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803D">Loaded!</text>
      </g>
    </g>
  </g>

  <!-- === KEY BENEFITS === -->
  <g transform="translate(50, 630)">
    <rect x="0" y="0" width="1000" height="130" rx="12" fill="white" stroke="#E2E8F0" stroke-width="2" filter="url(#shadow)"/>

    <text x="500" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#0F172A">✨ Key Benefits of Async Props</text>

    <!-- Left column benefits -->
    <g transform="translate(40, 55)">
      <circle cx="10" cy="10" r="10" fill="#22C55E"/>
      <text x="10" y="15" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="white">✓</text>
      <text x="30" y="15" font-family="system-ui, sans-serif" font-size="13" fill="#334155">Interactive immediately — users see fast content while slow data loads</text>
    </g>

    <g transform="translate(40, 85)">
      <circle cx="10" cy="10" r="10" fill="#22C55E"/>
      <text x="10" y="15" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="white">✓</text>
      <text x="30" y="15" font-family="system-ui, sans-serif" font-size="13" fill="#334155">No client-side fetching — data flows from Rails, no useEffect needed</text>
    </g>

    <!-- Right column benefits -->
    <g transform="translate(530, 55)">
      <circle cx="10" cy="10" r="10" fill="#22C55E"/>
      <text x="10" y="15" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="white">✓</text>
      <text x="30" y="15" font-family="system-ui, sans-serif" font-size="13" fill="#334155">Rails owns the data — auth, caching, DB access stay server-side</text>
    </g>

    <g transform="translate(530, 85)">
      <circle cx="10" cy="10" r="10" fill="#22C55E"/>
      <text x="10" y="15" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="white">✓</text>
      <text x="30" y="15" font-family="system-ui, sans-serif" font-size="13" fill="#334155">Progressive enhancement — each Suspense boundary fills independently</text>
    </g>
  </g>
</svg>
