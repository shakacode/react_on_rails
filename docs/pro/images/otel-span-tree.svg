<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <title>OpenTelemetry span tree for a server render</title>
  <desc>A trace tree rooted at one server-render request. First the cache-first build_execution_context probe loads the bundle into the VM. On a cache-first miss, a cold start then runs an upload span and a cache-miss build span. Next ror.result.prepare opens and wraps ror.vm.execute as its child, which runs the SSR JavaScript; outbound data fetches appear as HTTP child spans under vm.execute. Streaming async-props renders add their own stream and per-chunk branch off the root.</desc>
  <defs>
    <filter id="shadow"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
    <style>
      .bg { fill: #F8FAFC; }
      .title { fill: #0F172A; }
      .subtitle { fill: #64748B; }
      .root { fill: #DBEAFE; stroke: #3B82F6; }
      .root-text { fill: #1E40AF; }
      .warm { fill: #D1FAE5; stroke: #22C55E; }
      .warm-text { fill: #166534; }
      .cold { fill: #FEF3C7; stroke: #F59E0B; }
      .cold-text { fill: #92400E; }
      .http { fill: #FEF3C7; stroke: #F59E0B; }
      .http-text { fill: #92400E; }
      .stream { fill: #DBEAFE; stroke: #3B82F6; }
      .stream-text { fill: #1E40AF; }
      .chunk { fill: #D1FAE5; stroke: #22C55E; }
      .chunk-text { fill: #166534; }
      .connector { stroke: #CBD5E1; }
      .connector-dash { stroke: #CBD5E1; }
      .mono { font-family: monospace; }
      .note { fill: #64748B; }
      .legend { fill: #475569; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #0F172A; }
        .title { fill: #F1F5F9; }
        .subtitle { fill: #94A3B8; }
        .root { fill: #172554; stroke: #3B82F6; }
        .root-text { fill: #93C5FD; }
        .warm { fill: #052E16; stroke: #10B981; }
        .warm-text { fill: #6EE7B7; }
        .cold { fill: #422006; stroke: #F59E0B; }
        .cold-text { fill: #FDE68A; }
        .http { fill: #422006; stroke: #F59E0B; }
        .http-text { fill: #FDE68A; }
        .stream { fill: #172554; stroke: #3B82F6; }
        .stream-text { fill: #93C5FD; }
        .chunk { fill: #052E16; stroke: #10B981; }
        .chunk-text { fill: #6EE7B7; }
        .connector { stroke: #475569; }
        .connector-dash { stroke: #475569; }
        .note { fill: #94A3B8; }
        .legend { fill: #94A3B8; }
      }
    </style>
  </defs>

  <rect width="860" height="430" class="bg"/>
  <text x="430" y="28" text-anchor="middle" font-size="18" font-weight="700" class="title">OpenTelemetry span tree for one server render</text>
  <text x="430" y="47" text-anchor="middle" font-size="11" class="subtitle">Spans nest under the root request; cold-start and streaming add branches</text>

  <!-- Root -->
  <rect x="40" y="70" width="280" height="38" rx="9" class="root" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="56" y="86" font-size="11" font-weight="700" class="root-text mono">ror.ssr.request</text>
  <text x="56" y="100" font-size="9" class="root-text">root span — one per render request</text>

  <!-- vertical trunk -->
  <line x1="70" y1="108" x2="70" y2="392" class="connector" stroke-width="1.5"/>

  <!-- 1: cache-first build probe — always fires first -->
  <line x1="70" y1="135" x2="120" y2="135" class="connector" stroke-width="1.4"/>
  <rect x="120" y="118" width="300" height="34" rx="8" class="warm" stroke-width="1.4"/>
  <text x="136" y="133" font-size="10.5" font-weight="700" class="warm-text mono">ror.bundle.build_execution_context</text>
  <text x="136" y="146" font-size="9" class="warm-text">cache-first probe — warm hit loads the bundle into VM</text>

  <!-- 2: cold branch (dashed) — only on a cache-first miss: upload + rebuild -->
  <line x1="70" y1="178" x2="120" y2="178" class="connector-dash" stroke-width="1.4" stroke-dasharray="4 3"/>
  <rect x="120" y="161" width="200" height="34" rx="8" class="cold" stroke-width="1.4"/>
  <text x="130" y="176" font-size="10" font-weight="700" class="cold-text mono">ror.bundle.upload</text>
  <text x="130" y="189" font-size="8.5" class="cold-text">Rails posts the missing bundle</text>
  <line x1="320" y1="178" x2="330" y2="178" class="connector-dash" stroke-width="1.3" stroke-dasharray="4 3"/>
  <polygon points="330,174 338,178 330,182" class="cold-text" fill="#92400E"/>
  <rect x="338" y="161" width="194" height="34" rx="8" class="cold" stroke-width="1.4"/>
  <text x="346" y="175" font-size="8.5" font-weight="700" class="cold-text mono">ror.bundle.build_execution_context</text>
  <text x="346" y="188" font-size="8.5" class="cold-text">cache-miss rebuild of the VM</text>

  <!-- result.prepare is the parent span; vm.execute runs inside it -->
  <line x1="70" y1="221" x2="120" y2="221" class="connector" stroke-width="1.4"/>
  <rect x="120" y="204" width="300" height="32" rx="8" class="warm" stroke-width="1.4"/>
  <text x="136" y="219" font-size="10.5" font-weight="700" class="warm-text mono">ror.result.prepare</text>
  <text x="136" y="231" font-size="9" class="warm-text">builds the response — wraps the VM execution</text>

  <!-- vm.execute nested under result.prepare -->
  <line x1="135" y1="236" x2="135" y2="259" class="connector" stroke-width="1.3"/>
  <line x1="135" y1="259" x2="150" y2="259" class="connector" stroke-width="1.3"/>
  <rect x="150" y="242" width="270" height="32" rx="8" class="warm" stroke-width="1.4"/>
  <text x="166" y="257" font-size="10" font-weight="700" class="warm-text mono">ror.vm.execute</text>
  <text x="166" y="269" font-size="8.5" class="warm-text">run the SSR JavaScript inside the VM</text>

  <!-- HTTP children nested under vm.execute -->
  <line x1="165" y1="274" x2="165" y2="295" class="connector-dash" stroke-width="1.3" stroke-dasharray="4 3"/>
  <line x1="165" y1="295" x2="210" y2="295" class="connector-dash" stroke-width="1.3" stroke-dasharray="4 3"/>
  <rect x="210" y="282" width="270" height="26" rx="7" class="http" stroke-width="1.3"/>
  <text x="226" y="299" font-size="9" font-weight="600" class="http-text mono">HTTP child spans — outbound fetch() calls</text>

  <!-- Streaming branch -->
  <line x1="70" y1="346" x2="120" y2="346" class="connector-dash" stroke-width="1.4" stroke-dasharray="4 3"/>
  <rect x="120" y="330" width="300" height="32" rx="8" class="stream" stroke-width="1.4"/>
  <text x="136" y="346" font-size="10.5" font-weight="700" class="stream-text mono">ror.incremental.stream</text>
  <text x="136" y="358" font-size="9" class="stream-text">streaming (async-props) renders only</text>

  <line x1="150" y1="362" x2="150" y2="384" class="connector-dash" stroke-width="1.3" stroke-dasharray="4 3"/>
  <line x1="150" y1="384" x2="200" y2="384" class="connector-dash" stroke-width="1.3" stroke-dasharray="4 3"/>
  <rect x="200" y="372" width="280" height="26" rx="7" class="chunk" stroke-width="1.3"/>
  <text x="216" y="389" font-size="9.5" font-weight="600" class="chunk-text mono">ror.incremental.process_chunk — one per chunk</text>

  <!-- Legend -->
  <rect x="540" y="118" width="290" height="180" rx="11" fill="none" stroke="#E2E8F0" stroke-width="1.4"/>
  <text x="560" y="140" font-size="11" font-weight="700" class="legend">Reading the tree</text>
  <rect x="560" y="152" width="16" height="12" rx="3" class="warm" stroke-width="1.2"/>
  <text x="584" y="162" font-size="9.5" class="legend">Warm path — always fires, in order</text>
  <rect x="560" y="174" width="16" height="12" rx="3" class="cold" stroke-width="1.2"/>
  <text x="584" y="184" font-size="9.5" class="legend">Cold start — upload + rebuild after the probe</text>
  <rect x="560" y="196" width="16" height="12" rx="3" class="http" stroke-width="1.2"/>
  <text x="584" y="206" font-size="9.5" class="legend">HTTP children — captured automatically</text>
  <rect x="560" y="218" width="16" height="12" rx="3" class="stream" stroke-width="1.2"/>
  <text x="584" y="228" font-size="9.5" class="legend">Streaming — only for async-props renders</text>
  <text x="560" y="252" font-size="9" class="note">On a miss, build_execution_context appears</text>
  <text x="560" y="264" font-size="9" class="note">twice: the warm cache-first probe (may end</text>
  <text x="560" y="276" font-size="9" class="note">ERROR — expected), then, after ror.bundle.upload,</text>
  <text x="560" y="288" font-size="9" class="note">the cache-miss rebuild of the VM.</text>
</svg>
