<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <title>Rolling deploy without an adapter: the 410 storm</title>
  <desc>During a rolling deploy, draining old Rails (bundle hash abc) and new Rails (bundle hash def) both send SSR requests to a new renderer pool whose cache was seeded only with the current hash def. The def requests hit the cache, but the abc requests miss and trigger 410 Gone, re-upload, and retry once per request.</desc>
  <defs>
    <linearGradient id="railsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CC0000"/><stop offset="100%" stop-color="#990000"/>
    </linearGradient>
    <linearGradient id="lbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A90D9"/><stop offset="100%" stop-color="#2E5A8A"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#68A063"/><stop offset="100%" stop-color="#3C873A"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
    <style>
      .bg { fill: #F8FAFC; }
      .title { fill: #0F172A; }
      .subtitle { fill: #64748B; }
      .draining { fill: #FEF3C7; stroke: #F59E0B; }
      .draining-text { fill: #92400E; }
      .new { fill: #D1FAE5; stroke: #22C55E; }
      .new-text { fill: #166534; }
      .hit { fill: #D1FAE5; stroke: #22C55E; }
      .hit-text { fill: #166534; }
      .miss { fill: #FEE2E2; stroke: #DC2626; }
      .miss-text { fill: #991B1B; }
      .arrow { stroke: #94A3B8; }
      .head { fill: #94A3B8; }
      .label { fill: #475569; }
      .mono { font-family: monospace; }
      .caption { fill: #475569; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #0F172A; }
        .title { fill: #F1F5F9; }
        .subtitle { fill: #94A3B8; }
        .draining { fill: #422006; stroke: #F59E0B; }
        .draining-text { fill: #FDE68A; }
        .new { fill: #052E16; stroke: #10B981; }
        .new-text { fill: #6EE7B7; }
        .hit { fill: #052E16; stroke: #10B981; }
        .hit-text { fill: #6EE7B7; }
        .miss { fill: #450A0A; stroke: #EF4444; }
        .miss-text { fill: #FCA5A5; }
        .arrow { stroke: #CBD5E1; }
        .head { fill: #CBD5E1; }
        .label { fill: #94A3B8; }
        .caption { fill: #94A3B8; }
      }
      .flowA { animation: dashflow 1.2s linear infinite; }
      .flowB { animation: dashflow 1.2s linear infinite; }
      @keyframes dashflow { to { stroke-dashoffset: -16; } }
      .alarm { animation: alarm 1.4s ease-in-out infinite; }
      @keyframes alarm { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }
      @media (prefers-reduced-motion: reduce) { * { animation: none !important; opacity: 1 !important; } }
    </style>
  </defs>

  <rect width="880" height="400" class="bg"/>
  <text x="440" y="28" text-anchor="middle" font-size="18" font-weight="700" class="title">The problem: a 410 storm during a rolling deploy</text>
  <text x="440" y="47" text-anchor="middle" font-size="11" class="subtitle">The new renderer was seeded with the current hash only — draining requests miss</text>

  <!-- Traffic + LB -->
  <rect x="34" y="170" width="120" height="40" rx="9" fill="url(#lbGrad)" filter="url(#shadow)"/>
  <text x="94" y="194" text-anchor="middle" font-size="11" font-weight="600" fill="white">Load Balancer</text>
  <text x="94" y="158" text-anchor="middle" font-size="9.5" class="label">Incoming traffic</text>

  <!-- Old Rails (draining) -->
  <rect x="220" y="96" width="190" height="56" rx="10" class="draining" stroke-width="1.5"/>
  <text x="315" y="118" text-anchor="middle" font-size="11" font-weight="700" class="draining-text">Old Rails — draining</text>
  <text x="315" y="135" text-anchor="middle" font-size="10" class="draining-text mono">bundle hash abc</text>

  <!-- New Rails -->
  <rect x="220" y="228" width="190" height="56" rx="10" class="new" stroke-width="1.5"/>
  <text x="315" y="250" text-anchor="middle" font-size="11" font-weight="700" class="new-text">New Rails</text>
  <text x="315" y="267" text-anchor="middle" font-size="10" class="new-text mono">bundle hash def</text>

  <!-- LB arrows -->
  <line x1="154" y1="184" x2="216" y2="130" class="arrow" stroke-width="1.5"/>
  <polygon points="216,130 208,130 212,137" class="head"/>
  <line x1="154" y1="196" x2="216" y2="252" class="arrow" stroke-width="1.5"/>
  <polygon points="216,252 212,245 208,252" class="head"/>

  <!-- Renderer -->
  <rect x="470" y="158" width="190" height="84" rx="11" fill="url(#nodeGrad)" filter="url(#shadow)"/>
  <text x="565" y="182" text-anchor="middle" font-size="11.5" font-weight="700" fill="white">New Node Renderer</text>
  <text x="565" y="200" text-anchor="middle" font-size="9" fill="white" opacity="0.92">cold start — cache seeded</text>
  <text x="565" y="214" text-anchor="middle" font-size="9" fill="white" opacity="0.92">with current hash</text>
  <text x="565" y="230" text-anchor="middle" font-size="10" font-weight="700" fill="white" class="mono">def only</text>

  <!-- request arrows to renderer -->
  <line x1="410" y1="124" x2="466" y2="180" class="arrow flowA" stroke-width="1.8" stroke-dasharray="6 4"/>
  <polygon points="466,180 458,178 462,172" class="head"/>
  <rect x="404" y="138" width="74" height="15" rx="4" class="draining" stroke-width="1"/>
  <text x="441" y="150" text-anchor="middle" font-size="8" font-weight="600" class="draining-text mono">req · abc</text>

  <line x1="410" y1="256" x2="466" y2="220" class="arrow flowB" stroke-width="1.8" stroke-dasharray="6 4"/>
  <polygon points="466,220 458,222 462,228" class="head"/>
  <rect x="404" y="248" width="74" height="15" rx="4" class="new" stroke-width="1"/>
  <text x="441" y="260" text-anchor="middle" font-size="8" font-weight="600" class="new-text mono">req · def</text>

  <!-- outcomes: abc (draining, top lane) misses; def (current, bottom lane) hits -->
  <line x1="660" y1="186" x2="716" y2="150" class="arrow" stroke-width="1.6"/>
  <polygon points="716,150 708,148 711,156" class="head"/>
  <g class="alarm">
    <rect x="716" y="110" width="150" height="72" rx="10" class="miss" stroke-width="1.6"/>
    <text x="791" y="132" text-anchor="middle" font-size="11" font-weight="700" class="miss-text">abc → Cache MISS</text>
    <text x="791" y="148" text-anchor="middle" font-size="9.5" font-weight="700" class="miss-text">410 Gone</text>
    <text x="791" y="162" text-anchor="middle" font-size="8.5" class="miss-text">re-upload + retry,</text>
    <text x="791" y="174" text-anchor="middle" font-size="8.5" class="miss-text">once per request</text>
  </g>

  <line x1="660" y1="214" x2="716" y2="256" class="arrow" stroke-width="1.6"/>
  <polygon points="716,256 711,250 708,257" class="head"/>
  <rect x="716" y="242" width="150" height="58" rx="10" class="hit" stroke-width="1.5"/>
  <text x="791" y="266" text-anchor="middle" font-size="11" font-weight="700" class="hit-text">def → Cache HIT</text>
  <text x="791" y="284" text-anchor="middle" font-size="9.5" class="hit-text">fast SSR</text>

  <text x="440" y="350" text-anchor="middle" font-size="10.5" class="caption">The cold path is self-healing but not free — every draining request pays a renderer ↔ Rails round-trip until that bundle is cached.</text>
  <text x="440" y="372" text-anchor="middle" font-size="10" class="label">A deploy shows up as a latency and error-rate spike. The fix: seed both hashes (next diagram).</text>
</svg>
