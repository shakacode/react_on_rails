# Dependabot configuration
# - Only security updates (version updates disabled via open-pull-requests-limit: 0)
# - Dependencies grouped within each ecosystem/directory
# - 3-day minimum release age for new versions (so they can't be unpublished in NPM)
# - Labels: "dependencies" (default), language-specific (javascript/ruby/github-actions), "ready-for-hosted-ci"
#
# Note: Root pnpm workspace (/) covers packages/react-on-rails, etc.
# Dummy apps have separate lock files and are listed explicitly.

version: 2

# Group shakapacker gem + npm updates into a single PR for the execjs-compatible-dummy,
# which is a standalone app with independently pinned gem and npm versions that must match.
multi-ecosystem-groups:
  execjs-dummy-shakapacker:
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0

updates:
  # NPM/PNPM packages - root workspace and dummy apps
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/benchmarks/rspack-vite-dx"
      - "/react_on_rails/spec/dummy"
      - "/react_on_rails_pro/spec/dummy"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "javascript"
      - "ready-for-hosted-ci"
    # Disable version update PRs - only security updates will be created
    open-pull-requests-limit: 0
    cooldown:
      default-days: 3
    groups:
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"

  # NPM for execjs-compatible-dummy - grouped with bundler to keep shakapacker in sync
  - package-ecosystem: "npm"
    directory: "/react_on_rails_pro/spec/execjs-compatible-dummy"
    patterns:
      - "*"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "javascript"
      - "ready-for-hosted-ci"
    cooldown:
      default-days: 3
    groups:
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"
        exclude-patterns:
          - "shakapacker"
    multi-ecosystem-group: "execjs-dummy-shakapacker"

  # Ruby gems - root tooling plus Open source and Pro gems (including dummy apps)
  - package-ecosystem: "bundler"
    directories:
      - "/"
      - "/react_on_rails"
      - "/react_on_rails/spec/dummy"
      - "/react_on_rails_pro"
      - "/react_on_rails_pro/spec/dummy"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ruby"
      - "ready-for-hosted-ci"
    open-pull-requests-limit: 0
    cooldown:
      default-days: 3
    groups:
      bundler-security:
        applies-to: security-updates
        patterns:
          - "*"

  # Bundler for execjs-compatible-dummy - grouped with npm to keep shakapacker in sync
  - package-ecosystem: "bundler"
    directory: "/react_on_rails_pro/spec/execjs-compatible-dummy"
    patterns:
      - "*"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ruby"
      - "ready-for-hosted-ci"
    cooldown:
      default-days: 3
    groups:
      bundler-security:
        applies-to: security-updates
        patterns:
          - "*"
        exclude-patterns:
          - "shakapacker"
    multi-ecosystem-group: "execjs-dummy-shakapacker"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
      - "ready-for-hosted-ci"
    open-pull-requests-limit: 0
    cooldown:
      default-days: 3
    groups:
      actions-security:
        applies-to: security-updates
        patterns:
          - "*"
