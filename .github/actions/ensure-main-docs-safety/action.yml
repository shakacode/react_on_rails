name: Ensure main docs-only skips are safe
description: Prevents docs-only commits from skipping CI when previous main commit has unresolved test failures
inputs:
  docs-only:
    description: 'String output from ci-changes-detector ("true" or "false")'
    required: true
  previous-sha:
    description: 'SHA of the previous commit on main (github.event.before)'
    required: true
  exclude-workflows:
    description: 'Comma-separated workflow names to exclude from failure checks (e.g., "Benchmark Workflow")'
    required: false
    default: 'Benchmark Workflow'
runs:
  using: composite
  steps:
    - name: Check previous main commit status
      if: ${{ inputs.docs-only == 'true' && inputs.previous-sha != '' && inputs.previous-sha != '0000000000000000000000000000000000000000' }}
      uses: actions/github-script@v7
      env:
        PREVIOUS_SHA: ${{ inputs.previous-sha }}
        EXCLUDE_WORKFLOWS: ${{ inputs.exclude-workflows }}
        ACTION_PATH: ${{ github.action_path }}
      with:
        script: |
          const {
            checkPreviousMainCommitStatus
          } = require(`${process.env.ACTION_PATH}/check-previous-main.cjs`);

          await checkPreviousMainCommitStatus({
            github,
            context,
            core,
            previousSha: process.env.PREVIOUS_SHA,
            excludeWorkflowsInput: process.env.EXCLUDE_WORKFLOWS
          });
