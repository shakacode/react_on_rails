name: Check for full CI readiness label
description: Checks if the PR has a full CI readiness label
outputs:
  result:
    description: 'Whether a full CI readiness label is present (string: "true" or "false")'
    value: ${{ steps.check.outputs.result }}
runs:
  using: composite
  steps:
    - name: Check for full CI readiness label
      id: check
      uses: actions/github-script@v7
      with:
        result-encoding: string
        retries: 3
        script: |
          // Only check labels on pull requests
          if (!context.payload.pull_request) {
            return 'false';
          }

          const { data: labels } = await github.rest.issues.listLabelsOnIssue({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.payload.pull_request.number
          });

          const fullCiLabels = ['ready-for-full-ci', 'full-ci'];
          const labelNames = labels.map(label => label.name);
          const hasLabel = fullCiLabels.some(labelName => labelNames.includes(labelName));
          console.log(`full CI readiness label present: ${hasLabel}`);
          return hasLabel ? 'true' : 'false';
