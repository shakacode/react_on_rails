name: Check Markdown Links

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - '.github/workflows/check-markdown-links.yml'
      - '.lychee.toml'
      - '.prettierignore'
      - '.prettierrc'
      - 'pnpm-lock.yaml'
  pull_request:
    paths:
      - '**.md'
      - '.github/workflows/check-markdown-links.yml'
      - '.lychee.toml'
      - '.prettierignore'
      - '.prettierrc'
      - 'pnpm-lock.yaml'
  schedule:
    # Run daily at 3am UTC to catch stale cached links
    # See: https://lychee.cli.rs/github_action_recipes/caching/
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  markdown-format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: ./.github/actions/setup-node-with-retry
        with:
          node-version: '22.11.0'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts --filter='{.}'

      - name: Check markdown formatting
        shell: bash
        run: |
          markdown_files=()
          while IFS= read -r -d '' file; do
            if [ -f "$file" ] && [ ! -L "$file" ]; then
              markdown_files+=("$file")
            fi
          done < <(git ls-files -z -- '*.md' '*.mdx' '*.markdown')

          if [ "${#markdown_files[@]}" -eq 0 ]; then
            echo "No markdown files to check."
            exit 0
          fi

          pnpm exec prettier --check -- "${markdown_files[@]}"

  markdown-link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Check markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config .lychee.toml docs/ *.md react_on_rails_pro/*.md
          fail: true
