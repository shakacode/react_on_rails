name: JS unit tests for Renderer package

permissions:
  contents: read

on:
  push:
    branches:
      - 'main'
    # Always trigger on main; non-runtime detection handles skipping heavy jobs
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
  merge_group:
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run all jobs (bypass detect-changes)'
        required: false
        type: boolean
        default: false

jobs:
  detect-changes:
    permissions:
      contents: read
      actions: read
      issues: read
    runs-on: ubuntu-22.04
    outputs:
      docs_only: ${{ steps.detect.outputs.docs_only }}
      non_runtime_only: ${{ steps.detect.outputs.non_runtime_only }}
      run_lint: ${{ steps.detect.outputs.run_lint }}
      run_js_tests: ${{ steps.detect.outputs.run_js_tests }}
      run_ruby_tests: ${{ steps.detect.outputs.run_ruby_tests }}
      run_dummy_tests: ${{ steps.detect.outputs.run_dummy_tests }}
      run_generators: ${{ steps.detect.outputs.run_generators }}
      has_full_ci_label: ${{ steps.check-label.outputs.result }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch enough history for change detection (50 commits is usually sufficient for PRs)
          fetch-depth: 50
          persist-credentials: false
      - name: Check for full CI readiness label
        id: check-label
        uses: ./.github/actions/check-full-ci-label
      - name: Detect relevant changes
        id: detect
        run: |
          # If force_run is true OR a full CI readiness label is present, run everything
          if [ "${{ inputs.force_run }}" = "true" ] || [ "${{ steps.check-label.outputs.result }}" = "true" ]; then
            {
              echo "run_lint=true"
              echo "run_js_tests=true"
              echo "run_ruby_tests=true"
              echo "run_dummy_tests=true"
              echo "run_generators=true"
              echo "docs_only=false"
              echo "non_runtime_only=false"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASE_REF="${{ github.event.pull_request.base.sha || github.event.before || 'origin/main' }}"
          script/ci-changes-detector "$BASE_REF"
        shell: bash
      - name: Guard docs-only main pushes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ./.github/actions/ensure-main-docs-safety
        with:
          docs-only: ${{ steps.detect.outputs.docs_only }}
          previous-sha: ${{ github.event.before }}

  build:
    needs: detect-changes
    # Run heavyweight tests only for full-CI contexts. Regular PR updates rely on ci-required
    # plus local CI until a maintainer marks the PR ready for full validation.
    if: |
      !(
        github.event_name == 'push' &&
        github.ref == 'refs/heads/main' &&
        needs.detect-changes.outputs.non_runtime_only == 'true'
      ) && (
        github.event_name != 'pull_request' ||
        needs.detect-changes.outputs.has_full_ci_label == 'true' ||
        startsWith(github.base_ref, 'release/') ||
        startsWith(github.base_ref, 'releases/') ||
        startsWith(github.base_ref, 'release-')
      )
    strategy:
      matrix:
        node-version:
          # Always run: Latest Node version (fast feedback on PRs)
          - '22'
          # Full-CI contexts: Minimum supported Node version (full coverage)
          - '20'
        exclude:
          # Skip minimum dependency matrix on regular PRs (run only on main, merge queue, manual,
          # release targets, or with a full CI readiness label)
          - node-version: ${{ github.event_name == 'pull_request' && needs.detect-changes.outputs.has_full_ci_label != 'true' && !startsWith(github.base_ref, 'release/') && !startsWith(github.base_ref, 'releases/') && !startsWith(github.base_ref, 'release-') && '20' || '' }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Print system information
        run: |
          echo "Linux release: "; cat /etc/issue
          echo "Current user: "; whoami
          echo "Current directory: "; pwd
          echo "Node version: "; node -v
          echo "pnpm version: "; pnpm --version
      - name: run conversion script
        if: matrix.node-version == '20'
        run: script/convert
      - name: Install Node modules with pnpm
        run: pnpm install ${{ matrix.node-version == '22' && '--frozen-lockfile' || '--no-frozen-lockfile' }}
      - name: Build Renderer package
        run: pnpm build
      - name: Run JS unit tests for react-on-rails package
        run: pnpm --filter react-on-rails test
      - name: Run JS unit tests for react-on-rails-pro package
        run: pnpm --filter react-on-rails-pro test
      - name: Run JS unit tests for create-react-on-rails-app package
        run: pnpm --filter create-react-on-rails-app test
