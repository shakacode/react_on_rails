name: Run Full CI Suite

on:
  issue_comment:
    types: [created]

concurrency:
  group: ready-for-full-ci-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  request-full-ci:
    if: |
      github.event.issue.pull_request &&
      (
        startsWith(github.event.comment.body, '/run-skipped-ci') ||
        contains(github.event.comment.body, '\n/run-skipped-ci') ||
        startsWith(github.event.comment.body, '/run-skipped-tests') ||
        contains(github.event.comment.body, '\n/run-skipped-tests')
      )
    runs-on: ubuntu-22.04
    permissions:
      actions: write
      contents: read
      issues: write
      pull-requests: read
    steps:
      - name: Request full CI
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.issue.number;
            const actor = context.actor;

            const { data: permission } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner,
              repo,
              username: actor
            });

            if (!['admin', 'write'].includes(permission.permission)) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: `@${actor} Sorry, only repository collaborators with write access can trigger full CI runs.`
              });
              core.setFailed(`User ${actor} does not have permission to trigger full CI`);
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: issueNumber
            });

            const repoFullName = `${owner}/${repo}`;
            const headRepoFullName = pr.head.repo?.full_name;

            if (!headRepoFullName || headRepoFullName !== repoFullName) {
              await github.rest.reactions.createForIssueComment({
                owner,
                repo,
                comment_id: context.payload.comment.id,
                content: 'confused'
              });

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: [
                  'Unable to run full CI from `/run-skipped-ci` because the PR branch is from a fork or the head repository is unavailable.',
                  '',
                  'A maintainer should push the branch to this repository or trigger the required workflows manually.'
                ].join('\n')
              });
              return;
            }

            const workflows = [
              ['Lint JS and Ruby', 'lint-js-and-ruby.yml', { force_run: 'true' }],
              ['JS unit tests for Renderer package', 'package-js-tests.yml', { force_run: 'true' }],
              ['Rspec test for gem', 'gem-tests.yml', { force_run: 'true' }],
              ['Integration Tests', 'integration-tests.yml', { force_run: 'true' }],
              ['Assets Precompile Check', 'precompile-check.yml', { force_run: 'true' }],
              ['Generator tests', 'examples.yml', { force_run: 'true' }],
              ['Playwright E2E Tests', 'playwright.yml', {}],
              ['React on Rails Pro - Integration Tests', 'pro-integration-tests.yml', { force_run: 'true' }],
              ['React on Rails Pro - Package Tests', 'pro-test-package-and-gem.yml', { force_run: 'true' }]
            ];

            const dispatchResults = await Promise.allSettled(
              workflows.map(([workflowName, workflowFile, inputs]) =>
                github.rest.actions.createWorkflowDispatch({
                  owner,
                  repo,
                  workflow_id: workflowFile,
                  ref: pr.head.ref,
                  inputs
                }).then(() => ({ file: workflowFile, name: workflowName }))
              )
            );

            const succeeded = [];
            const failed = [];

            for (const [index, result] of dispatchResults.entries()) {
              if (result.status === 'fulfilled') {
                succeeded.push(result.value);
              } else {
                failed.push({
                  workflow: workflows[index][0],
                  error: result.reason?.message || String(result.reason)
                });
              }
            }

            let labelAdded = false;
            if (succeeded.length > 0) {
              try {
                try {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name: 'ready-for-full-ci',
                    description: 'Run full GitHub CI for this PR',
                    color: '0E8A16'
                  });
                } catch (error) {
                  if (error.status !== 422) {
                    throw error;
                  }
                }

                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  labels: ['ready-for-full-ci']
                });
                labelAdded = true;
              } catch (error) {
                failed.push({ workflow: 'ready-for-full-ci label', error: error.message });
              }
            }

            await github.rest.reactions.createForIssueComment({
              owner,
              repo,
              comment_id: context.payload.comment.id,
              content: succeeded.length > 0 ? 'rocket' : 'confused'
            });

            const failedList = failed.length > 0
              ? `\n\nFailed:\n${failed.map((failure) => `- ${failure.workflow}: ${failure.error}`).join('\n')}`
              : '';
            const labelMessage = labelAdded
              ? 'Added `ready-for-full-ci`, so future commits on this PR will keep running full CI until the label is removed.'
              : succeeded.length > 0
                ? 'The workflows were triggered, but `ready-for-full-ci` was not added. See the failure details below.'
                : '`ready-for-full-ci` was not added because no workflows were triggered.';

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: [
                '## Full CI Requested',
                '',
                `Triggered ${succeeded.length} workflow(s) for \`${pr.head.sha.slice(0, 12)}\`.`,
                labelMessage,
                '',
                'To disable full CI mode, use `/stop-run-skipped-ci`.',
                failedList
              ].join('\n')
            });

            if (failed.length > 0) {
              core.setFailed(`Failed to trigger: ${failed.map((failure) => failure.workflow).join(', ')}`);
            }
