name: Integration Tests

permissions:
  contents: read

concurrency:
  group: ${{ github.event.pull_request.number && format('{0}-pr-{1}', github.workflow, github.event.pull_request.number) || format('{0}-{1}', github.workflow, github.sha) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  push:
    branches:
      - 'main'
    # Always trigger on main; non-runtime detection handles skipping heavy jobs
  pull_request:
    paths-ignore:
      - '**.md'
      - 'AGENTS_USER_GUIDE.md'
      - 'docs/**'
      - 'llms.txt'
      - 'llms-full.txt'
      - '.lychee.toml'
      - 'react_on_rails_pro/**'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run all jobs (bypass detect-changes)'
        required: false
        type: boolean
        default: false

jobs:
  detect-changes:
    permissions:
      contents: read
      actions: read
    runs-on: ubuntu-22.04
    outputs:
      docs_only: ${{ steps.detect.outputs.docs_only }}
      non_runtime_only: ${{ steps.detect.outputs.non_runtime_only }}
      run_lint: ${{ steps.detect.outputs.run_lint }}
      run_js_tests: ${{ steps.detect.outputs.run_js_tests }}
      run_ruby_tests: ${{ steps.detect.outputs.run_ruby_tests }}
      run_dummy_tests: ${{ steps.detect.outputs.run_dummy_tests }}
      run_generators: ${{ steps.detect.outputs.run_generators }}
      has_full_ci_label: ${{ steps.check-label.outputs.result }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch enough history for change detection (50 commits is usually sufficient for PRs)
          fetch-depth: 50
          persist-credentials: false
      - name: Check for full-ci label
        id: check-label
        uses: ./.github/actions/check-full-ci-label
      - name: Detect relevant changes
        id: detect
        run: |
          # If force_run is true OR full-ci label is present, run everything
          if [ "${{ inputs.force_run }}" = "true" ] || [ "${{ steps.check-label.outputs.result }}" = "true" ]; then
            {
              echo "run_lint=true"
              echo "run_js_tests=true"
              echo "run_ruby_tests=true"
              echo "run_dummy_tests=true"
              echo "run_generators=true"
              echo "docs_only=false"
              echo "non_runtime_only=false"
            } >> "$GITHUB_OUTPUT"
          else
            BASE_REF="${{ github.event.pull_request.base.sha || github.event.before || 'origin/main' }}"
            script/ci-changes-detector "$BASE_REF"
          fi
        shell: bash
      - name: Guard docs-only main pushes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ./.github/actions/ensure-main-docs-safety
        with:
          docs-only: ${{ steps.detect.outputs.docs_only }}
          previous-sha: ${{ github.event.before }}

  setup-integration-matrix:
    needs: detect-changes
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          # Determine if we should run full matrix (main, workflow_dispatch, force_run, or full-ci label)
          if [[ "${{ github.ref }}" == "refs/heads/main" ]] || \
             [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || \
            [[ "${{ inputs.force_run }}" == "true" ]] || \
            [[ "${{ needs.detect-changes.outputs.has_full_ci_label }}" == "true" ]]; then
            # Full matrix: test both latest and minimum supported versions
            echo 'matrix={"include":[{"ruby-version":"3.4","node-version":"22","dependency-level":"latest"},{"ruby-version":"3.2","node-version":"20","dependency-level":"minimum"}]}' >> "$GITHUB_OUTPUT"
          else
            # PR matrix: test only latest versions for fast feedback
            echo 'matrix={"include":[{"ruby-version":"3.4","node-version":"22","dependency-level":"latest"}]}' >> "$GITHUB_OUTPUT"
          fi

  build-dummy-app-webpack-test-bundles:
    needs: [detect-changes, setup-integration-matrix]
    # Skip only if: main push AND non-runtime-only changes
    # Otherwise run if: on main OR workflow_dispatch OR dummy tests needed
    # This allows docs/comment-only commits to skip heavy jobs while ensuring full CI on main for code changes
    if: |
      !(
        github.event_name == 'push' &&
        github.ref == 'refs/heads/main' &&
        needs.detect-changes.outputs.non_runtime_only == 'true'
      ) && (
        github.ref == 'refs/heads/main' ||
        github.event_name == 'workflow_dispatch' ||
        needs.detect-changes.outputs.run_dummy_tests == 'true'
      )
    strategy:
      matrix: ${{ fromJson(needs.setup-integration-matrix.outputs.matrix) }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      # libyaml-dev is needed for psych v5
      # this gem depends on sdoc which depends on rdoc which depends on psych
      - name: Install libyaml-dev (required for psych v5 native extensions)
        run: sudo apt-get update && sudo apt-get install -y libyaml-dev
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler: 2.5.9
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Print system information
        run: |
          echo "Linux release: "; cat /etc/issue
          echo "Current user: "; whoami
          echo "Current directory: "; pwd
          echo "Ruby version: "; ruby -v
          echo "Node version: "; node -v
          echo "pnpm version: "; pnpm --version
          echo "Bundler version: "; bundle --version
      - name: Run conversion script for older Node compatibility
        if: matrix.dependency-level == 'minimum'
        run: script/convert
      - name: Install Node modules with pnpm
        # minimum config changes package.json (shakapacker version), so can't use frozen lockfile
        run: pnpm install ${{ matrix.dependency-level == 'latest' && '--frozen-lockfile' || '--no-frozen-lockfile' }}
      - name: Build workspace packages
        run: pnpm run build
      - name: Verify single React resolution for core dummy build
        run: node script/check-single-react-resolution.mjs react_on_rails/spec/dummy packages/react-on-rails
      - name: Install Ruby Gems for dummy app
        uses: ./.github/actions/setup-bundle
        with:
          working-directory: react_on_rails/spec/dummy
          ruby-version: ${{ matrix.ruby-version }}
          frozen: ${{ matrix.dependency-level == 'minimum' && 'false' || 'true' }}
      - name: generate file system-based packs
        run: cd react_on_rails/spec/dummy && RAILS_ENV="test" bundle exec rake react_on_rails:generate_packs
      - name: Smoke check generated pack entrypoints
        run: test -s react_on_rails/spec/dummy/client/app/generated/server-bundle-generated.js
      - name: Build test bundles for dummy app
        run: |
          rm -rf react_on_rails/spec/dummy/public/webpack/test
          pnpm --filter "react_on_rails" run build:rescript
          cd react_on_rails/spec/dummy && RAILS_ENV="test" NODE_ENV="test" bin/shakapacker
      - id: get-sha
        run: echo "sha=\"$(git rev-parse HEAD)\"" >> "$GITHUB_OUTPUT"
      - name: Save test Webpack bundles to cache (for build number checksum used by RSpec job)
        uses: actions/cache/save@v4
        with:
          path: react_on_rails/spec/dummy/public/webpack
          key: dummy-app-webpack-bundle-${{ steps.get-sha.outputs.sha }}-ruby${{ matrix.ruby-version }}-${{ matrix.dependency-level }}

  dummy-app-integration-tests:
    needs: [detect-changes, setup-integration-matrix, build-dummy-app-webpack-test-bundles]
    # Run on main, workflow_dispatch, OR when tests needed on PR
    if: |
      !(
        github.event_name == 'push' &&
        github.ref == 'refs/heads/main' &&
        needs.detect-changes.outputs.non_runtime_only == 'true'
      ) && (
        github.ref == 'refs/heads/main' ||
        github.event_name == 'workflow_dispatch' ||
        needs.detect-changes.outputs.run_dummy_tests == 'true'
      )
    strategy:
      matrix: ${{ fromJson(needs.setup-integration-matrix.outputs.matrix) }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      # libyaml-dev is needed for psych v5 native extensions (sdoc -> rdoc -> psych)
      - name: Install libyaml-dev (required for psych v5 native extensions)
        run: sudo apt-get update && sudo apt-get install -y libyaml-dev
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler: 2.5.9
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Print system information
        run: |
          echo "Linux release: "; cat /etc/issue
          echo "Current user: "; whoami
          echo "Current directory: "; pwd
          echo "Ruby version: "; ruby -v
          echo "Node version: "; node -v
          echo "pnpm version: "; pnpm --version
          echo "Bundler version: "; bundle --version
      - name: Run conversion script for older Node compatibility
        if: matrix.dependency-level == 'minimum'
        run: script/convert
      - id: get-sha
        run: echo "sha=\"$(git rev-parse HEAD)\"" >> "$GITHUB_OUTPUT"
      - name: Save test Webpack bundles to cache (for build number checksum used by RSpec job)
        uses: actions/cache@v4
        with:
          path: react_on_rails/spec/dummy/public/webpack
          key: dummy-app-webpack-bundle-${{ steps.get-sha.outputs.sha }}-ruby${{ matrix.ruby-version }}-${{ matrix.dependency-level }}
      - name: Install Node modules with pnpm
        # minimum config changes package.json (shakapacker version), so can't use frozen lockfile
        run: pnpm install ${{ matrix.dependency-level == 'latest' && '--frozen-lockfile' || '--no-frozen-lockfile' }}
      - name: Build workspace packages
        run: pnpm run build
      - name: Dummy JS tests
        run: pnpm --filter "react_on_rails" run test:js
      - name: Install Ruby Gems for package
        uses: ./.github/actions/setup-bundle
        with:
          working-directory: react_on_rails
          ruby-version: ${{ matrix.ruby-version }}
          frozen: ${{ matrix.dependency-level == 'minimum' && 'false' || 'true' }}
      - name: Install Ruby Gems for dummy app
        uses: ./.github/actions/setup-bundle
        with:
          working-directory: react_on_rails/spec/dummy
          ruby-version: ${{ matrix.ruby-version }}
          frozen: ${{ matrix.dependency-level == 'minimum' && 'false' || 'true' }}
      - name: Ensure minimum required Chrome version
        run: |
          echo -e "Already installed $(google-chrome --version)\n"
          MINIMUM_REQUIRED_CHROME_VERSION=75
          INSTALLED_CHROME_MAJOR_VERSION="$(google-chrome --version | tr ' .' '\t' | cut -f3)"
          if [[ $INSTALLED_CHROME_MAJOR_VERSION -lt $MINIMUM_REQUIRED_CHROME_VERSION ]]; then
            wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
            sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
            sudo apt-get update
            sudo apt-get install google-chrome-stable
            echo -e "\nInstalled $(google-chrome --version)"
          fi
      - name: Increase the amount of inotify watchers
        run: echo fs.inotify.max_user_watches=524288 | sudo tee -a /etc/sysctl.conf && sudo sysctl -p
      - name: generate file system-based packs
        run: cd react_on_rails/spec/dummy && RAILS_ENV="test" bundle exec rake react_on_rails:generate_packs
      - name: Git Stuff
        if: matrix.dependency-level == 'minimum'
        run: |
          git config user.email "you@example.com"
          git config user.name "Your Name"
          git commit -am "stop generators from complaining about uncommitted code"
      - run: cd react_on_rails/spec/dummy && bundle info shakapacker
      - name: Set packer version environment variable
        run: |
          echo "CI_DEPENDENCY_LEVEL=ruby${{ matrix.ruby-version }}-${{ matrix.dependency-level }}" >> "$GITHUB_ENV"
      # Pin the package Gemfile explicitly for parity with pro-lint.yml/benchmark.yml
      # and to stay robust if the package and dummy Gemfiles ever diverge.
      - name: Main CI
        env:
          BUNDLE_GEMFILE: ${{ github.workspace }}/react_on_rails/Gemfile
        run: cd react_on_rails && bundle exec rake run_rspec:all_dummy
      - name: Store test results
        uses: actions/upload-artifact@v4
        with:
          name: main-rspec-${{ github.run_id }}-${{ github.job }}-ruby${{ matrix.ruby-version }}-${{ matrix.dependency-level }}
          path: ~/rspec
      - name: Store artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dummy-app-capybara-${{ github.run_id }}-${{ github.job }}-ruby${{ matrix.ruby-version }}-${{ matrix.dependency-level }}
          path: react_on_rails/spec/dummy/tmp/capybara
      - name: Store artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dummy-app-test-log-${{ github.run_id }}-${{ github.job }}-ruby${{ matrix.ruby-version }}-${{ matrix.dependency-level }}
          path: react_on_rails/spec/dummy/log/test.log
      - name: Store artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dummy-app-pnpm-log-${{ github.run_id }}-${{ github.job }}-ruby${{ matrix.ruby-version }}-${{ matrix.dependency-level }}
          path: react_on_rails/spec/dummy/pnpm-debug.log
