name: Benchmark Workflow

on:
  workflow_dispatch:
    inputs:
      routes:
        description: 'Comma-separated routes to benchmark (e.g., "/,/hello"). Leave empty to auto-detect from Rails.'
        required: false
        type: string
      rate:
        description: 'Requests per second (use "max" for maximum throughput)'
        required: false
        default: 'max'
        type: string
      duration:
        description: 'Duration (e.g., "30s", "1m", "90s")'
        required: false
        default: '30s'
        type: string
      request_timeout:
        description: 'Request timeout (e.g., "60s", "1m", "90s")'
        required: false
        default: '60s'
        type: string
      connections:
        description: 'Concurrent connections/virtual users (also used as max)'
        required: false
        default: 10
        type: number
      web_concurrency:
        description: 'Number of Puma worker processes'
        required: false
        default: 4
        type: number
      rails_threads:
        description: 'Number of Puma threads (min and max will be same)'
        required: false
        default: 3
        type: number
      app_version:
        description: 'Which app version to benchmark'
        required: false
        default: 'both'
        type: choice
        options:
          - 'both'
          - 'core_only'
          - 'pro_only'
          - 'pro_rails_only'
          - 'pro_node_renderer_only'
  push:
    branches:
      - main
    # Always trigger on main; non-runtime detection handles skipping heavy jobs
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths-ignore:
      - '**.md'
      - 'AGENTS_USER_GUIDE.md'
      - 'docs/**'
      - 'llms.txt'
      - 'llms-full.txt'
      - '.lychee.toml'
# Cancel stale PR benchmark runs when new commits are pushed.
# Main runs are never cancelled so every merge is measured.
concurrency:
  group: ${{ github.event.pull_request.number && format('benchmark-pr-{0}', github.event.pull_request.number) || format('benchmark-{0}', github.sha) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  RUBY_VERSION: '3.3.7'
  K6_VERSION: '2.0.0'
  VEGETA_VERSION: '12.13.0'
  # Benchmark parameters (defaults in bench.rb unless overridden here for CI)
  ROUTES: ${{ github.event.inputs.routes }}
  RATE: ${{ github.event.inputs.rate || 'max' }}
  DURATION: ${{ github.event.inputs.duration }}
  REQUEST_TIMEOUT: ${{ github.event.inputs.request_timeout }}
  CONNECTIONS: ${{ github.event.inputs.connections }}
  MAX_CONNECTIONS: ${{ github.event.inputs.connections }}
  # WEB_CONCURRENCY default is set dynamically to NPROC-1 in "Configure benchmark commands" step
  WEB_CONCURRENCY: ${{ github.event.inputs.web_concurrency }}
  RAILS_MAX_THREADS: ${{ github.event.inputs.rails_threads || 3 }}
  RAILS_MIN_THREADS: ${{ github.event.inputs.rails_threads || 3 }}

jobs:
  detect-changes:
    permissions:
      contents: read
      actions: read
    runs-on: ubuntu-24.04
    outputs:
      non_runtime_only: ${{ steps.detect.outputs.non_runtime_only }}
      run_core_benchmarks: ${{ steps.benchmark-outputs.outputs.run_core_benchmarks }}
      run_pro_benchmarks: ${{ steps.benchmark-outputs.outputs.run_pro_benchmarks }}
      run_pro_node_renderer_benchmarks: ${{ steps.benchmark-outputs.outputs.run_pro_node_renderer_benchmarks }}
      run_benchmark_suites: ${{ steps.benchmark-matrices.outputs.run_benchmark_suites }}
      benchmark_matrix: ${{ steps.benchmark-matrices.outputs.benchmark_matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 50
          persist-credentials: false
      - name: Detect relevant changes
        id: detect
        run: |
          BASE_REF="${{ github.event.pull_request.base.sha || github.event.before || 'origin/main' }}"
          script/ci-changes-detector "$BASE_REF"
        shell: bash
      - name: Guard docs-only main pushes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ./.github/actions/ensure-main-docs-safety
        with:
          docs-only: ${{ steps.detect.outputs.docs_only }}
          previous-sha: ${{ github.event.before }}
      - name: Set benchmark outputs
        id: benchmark-outputs
        if: steps.detect.outputs.non_runtime_only != 'true'
        run: |
          RUN_CORE_BENCHMARKS=false
          RUN_PRO_BENCHMARKS=false
          RUN_PRO_NODE_RENDERER_BENCHMARKS=false

          if [ "${{ steps.detect.outputs.run_ruby_tests }}" = "true" ] ||
             [ "${{ steps.detect.outputs.run_js_tests }}" = "true" ] ||
             [ "${{ steps.detect.outputs.run_dummy_tests }}" = "true" ]; then
            RUN_CORE_BENCHMARKS=true
            RUN_PRO_BENCHMARKS=true
          fi

          if [ "${{ steps.detect.outputs.run_pro_tests }}" = "true" ] ||
             [ "${{ steps.detect.outputs.run_pro_dummy_tests }}" = "true" ]; then
            RUN_PRO_BENCHMARKS=true
          fi

          if [ "${{ steps.detect.outputs.run_pro_node_renderer_tests }}" = "true" ]; then
            RUN_PRO_BENCHMARKS=true
            RUN_PRO_NODE_RENDERER_BENCHMARKS=true
          fi

          echo "run_core_benchmarks=$RUN_CORE_BENCHMARKS" >> "$GITHUB_OUTPUT"
          echo "run_pro_benchmarks=$RUN_PRO_BENCHMARKS" >> "$GITHUB_OUTPUT"
          echo "run_pro_node_renderer_benchmarks=$RUN_PRO_NODE_RENDERER_BENCHMARKS" >> "$GITHUB_OUTPUT"
        shell: bash
      - name: Set benchmark matrices
        id: benchmark-matrices
        # Always runs. GitHub Actions evaluates `strategy.matrix` for downstream jobs at
        # workflow-construction time, before their `if:` gates — so an empty output would
        # crash `fromJSON('')` even when the consuming job is otherwise skipped.
        # Bump shard totals in benchmarks/generate_matrix.rb when a suite's route set
        # outgrows its current shard count.
        # The script is stdlib-only, so the runner's system Ruby is enough (no Bundler/Rails boot).
        env:
          BENCHMARK_APP_VERSION: ${{ github.event.inputs.app_version || 'both' }}
          BENCHMARK_EVENT_NAME: ${{ github.event_name }}
          BENCHMARK_NON_RUNTIME_ONLY: ${{ steps.detect.outputs.non_runtime_only }}
          BENCHMARK_PULL_REQUEST_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name || '' }}
          BENCHMARK_PULL_REQUEST_LABELS: ${{ github.event_name == 'pull_request' && toJSON(github.event.pull_request.labels.*.name) || '[]' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RUN_CORE_BENCHMARKS: ${{ steps.benchmark-outputs.outputs.run_core_benchmarks || 'false' }}
          RUN_PRO_BENCHMARKS: ${{ steps.benchmark-outputs.outputs.run_pro_benchmarks || 'false' }}
          RUN_PRO_NODE_RENDERER_BENCHMARKS: ${{ steps.benchmark-outputs.outputs.run_pro_node_renderer_benchmarks || 'false' }}
        run: |
          BENCHMARK_MATRIX=$(ruby benchmarks/generate_matrix.rb)
          export BENCHMARK_MATRIX
          RUN_BENCHMARK_SUITES=$(ruby -rjson -e 'puts JSON.parse(ENV.fetch("BENCHMARK_MATRIX")).fetch("include").any? { |row| row.fetch("suite_id") != "none" }')

          {
            echo "run_benchmark_suites=$RUN_BENCHMARK_SUITES"
            echo "benchmark_matrix<<EOF"
            echo "$BENCHMARK_MATRIX"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        shell: bash

  benchmark:
    needs: detect-changes
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect-changes.outputs.benchmark_matrix) }}
    # Which events/labels actually select suites is decided in
    # benchmarks/generate_matrix.rb (suite_requested_by_event? / suite_selected_by_input?):
    # push to main, workflow_dispatch, relevant test-impact changes, or same-repo PRs
    # with suite-specific benchmark labels. The 'full-ci' label is intentionally
    # excluded — it controls test workflows, not benchmarks. This job just runs
    # whatever non-empty matrix that produces; the same-repo PR gating follows
    # https://bencher.dev/docs/how-to/github-actions/#pull-requests.
    name: ${{ matrix.job_name }}
    if: needs.detect-changes.outputs.run_benchmark_suites == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      issues: write
      pull-requests: write
      checks: write
    env:
      SECRET_KEY_BASE: 'dummy-secret-key-for-ci-testing-not-used-in-production'
      REACT_ON_RAILS_PRO_LICENSE: ${{ secrets.REACT_ON_RAILS_PRO_LICENSE_V2 }}
      BENCHMARK_SHARD_INDEX: ${{ matrix.shard_index }}
      BENCHMARK_TOTAL_SHARDS: ${{ matrix.shard_total }}
      BENCHMARK_SHARD_LABEL: ${{ matrix.shard_label }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Bencher CLI
        # Pinned: alert-detection heuristics grep stderr for "Alert[s]",
        # "threshold violation", and "boundary violation". Those strings
        # are not a documented API contract, so upgrading the CLI requires
        # re-verifying that the expected phrases still appear in alert output.
        uses: bencherdev/bencher@v0.6.2

      - name: Add tools directory to PATH
        run: |
          mkdir -p ~/bin
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Install libyaml-dev
        # Must precede any gem install/load: psych links libyaml dynamically. On warm caches the
        # missing-lib failure is silent; cold runs hit it.
        run: sudo apt-get install -y libyaml-dev

      - name: Setup k6
        if: matrix.benchmark_tool == 'k6'
        uses: grafana/setup-k6-action@v1
        with:
          k6-version: ${{ env.K6_VERSION }}

      - name: Cache Vegeta binary
        id: cache-vegeta
        if: matrix.benchmark_tool == 'vegeta'
        uses: actions/cache@v5
        with:
          path: ~/bin/vegeta
          key: vegeta-${{ runner.os }}-${{ runner.arch }}-${{ env.VEGETA_VERSION }}

      - name: Install Vegeta
        if: matrix.benchmark_tool == 'vegeta' && steps.cache-vegeta.outputs.cache-hit != 'true'
        run: |
          echo "Installing Vegeta v${VEGETA_VERSION}"
          wget -q "https://github.com/tsenart/vegeta/releases/download/v${VEGETA_VERSION}/vegeta_${VEGETA_VERSION}_linux_amd64.tar.gz"
          tar -xzf "vegeta_${VEGETA_VERSION}_linux_amd64.tar.gz"
          mv vegeta ~/bin/

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}

      - name: Get gem home directory
        id: gem-home
        run: echo "path=$(gem env home)" >> "$GITHUB_OUTPUT"

      - name: Cache foreman gem
        id: cache-foreman
        uses: actions/cache@v5
        with:
          path: ${{ steps.gem-home.outputs.path }}
          key: foreman-gem-${{ runner.os }}-${{ runner.arch }}-ruby-${{ env.RUBY_VERSION }}

      - name: Install foreman
        if: steps.cache-foreman.outputs.cache-hit != 'true'
        run: gem install foreman

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true
          cache_dependency_path: '**/pnpm-lock.yaml'
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Print system information
        run: |
          echo "Linux release: "
          cat /etc/issue
          echo "Current user: "
          whoami
          echo "Current directory: "
          pwd
          echo "Ruby version: "
          ruby -v
          echo "Node version: "
          node -v
          echo "Pnpm version: "
          pnpm --version
          echo "Bundler version: "
          bundle --version

      - name: Configure benchmark commands
        run: |
          NPROC=$(nproc)
          echo "Available CPUs: $NPROC"

          if [ "$NPROC" -le 1 ]; then
            SERVER_CMD="bin/prod"
            BENCH_CMD="ruby"
          else
            SERVER_CMD="taskset -c 1-$((NPROC-1)) bin/prod"
            BENCH_CMD="taskset -c 0 ruby"
          fi

          echo "SERVER_CMD=$SERVER_CMD" >> "$GITHUB_ENV"
          echo "BENCH_CMD=$BENCH_CMD" >> "$GITHUB_ENV"

          if [ -z "$WEB_CONCURRENCY" ]; then
            # Clamp to >=1 so single-CPU runners don't end up with WEB_CONCURRENCY=0 (Puma
            # would start in single-mode, which the benchmarks aren't tuned for).
            WEB_CONCURRENCY=$((NPROC > 1 ? NPROC - 1 : 1))
            echo "WEB_CONCURRENCY=$WEB_CONCURRENCY" >> "$GITHUB_ENV"
            echo "WEB_CONCURRENCY (auto): $WEB_CONCURRENCY"
          else
            echo "WEB_CONCURRENCY (from input): $WEB_CONCURRENCY"
          fi

          echo "SERVER_CMD: $SERVER_CMD"
          echo "BENCH_CMD: $BENCH_CMD"

      - name: Install Node modules with pnpm
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm run build

      - name: Install Ruby Gems for the benchmarked app
        uses: ./.github/actions/setup-bundle
        with:
          working-directory: ${{ matrix.app_directory }}
          ruby-version: ${{ env.RUBY_VERSION }}

      - name: Generate file-system based entrypoints for Pro
        if: matrix.generate_packs == 'true'
        working-directory: ${{ matrix.app_directory }}
        run: bundle exec rake react_on_rails:generate_packs

      - name: Prepare production assets
        working-directory: ${{ matrix.app_directory }}
        run: |
          set -e
          echo "🔨 Building ${{ matrix.suite_name }} production assets..."

          if ! bin/prod-assets; then
            echo "❌ ERROR: Failed to build production assets"
            exit 1
          fi

          echo "✅ Production assets built successfully"

      - name: Start Pro node renderer
        if: matrix.server_kind == 'node-renderer'
        working-directory: ${{ matrix.app_directory }}
        env:
          RAILS_ENV: production
          NODE_ENV: production
          RENDERER_LOG_LEVEL: error
          RENDERER_PORT: 3800
        run: |
          set -e
          echo "🔧 Pre-seeding node renderer bundle cache..."
          bundle exec rake react_on_rails_pro:pre_seed_renderer_cache MODE=symlink

          echo "🚀 Starting ${{ matrix.suite_name }} node renderer..."
          node renderer/node-renderer.js &
          echo "Node renderer started in background"

          echo "⏳ Waiting for node renderer to be ready..."
          for i in {1..30}; do
            if ruby -e "require 'socket'; TCPSocket.new('localhost', 3800).close"; then
              echo "✅ Node renderer is ready and listening"
              exit 0
            fi
            echo "  Attempt $i/30: Node renderer not ready yet..."
            sleep 1
          done

          echo "❌ ERROR: Node renderer failed to start within 30 seconds"
          exit 1

      - name: Start Rails production server
        if: matrix.server_kind == 'rails'
        working-directory: ${{ matrix.app_directory }}
        run: |
          set -e
          echo "🚀 Starting ${{ matrix.suite_name }} production server..."
          $SERVER_CMD &
          echo "Server started in background"

          echo "⏳ Waiting for server to be ready..."
          for i in {1..30}; do
            if curl -fsS http://localhost:3001 > /dev/null; then
              echo "✅ Server is ready and responding"
              exit 0
            fi
            echo "  Attempt $i/30: Server not ready yet..."
            sleep 1
          done

          echo "❌ ERROR: Server failed to start within 30 seconds"
          exit 1

      - name: Execute benchmark suite
        timeout-minutes: ${{ matrix.benchmark_timeout_minutes }}
        run: |
          set -e
          echo "🏃 Running ${{ matrix.suite_name }} benchmark suite..."

          if [ "${{ matrix.pro_env }}" = "true" ]; then
            if ! PRO=true $BENCH_CMD "${{ matrix.benchmark_script }}"; then
              echo "❌ ERROR: Benchmark execution failed"
              exit 1
            fi
          elif ! $BENCH_CMD "${{ matrix.benchmark_script }}"; then
            echo "❌ ERROR: Benchmark execution failed"
            exit 1
          fi

          echo "✅ Benchmark suite completed successfully"

      - name: Validate benchmark results
        env:
          SUITE_NAME: ${{ matrix.suite_name }}
          SUMMARY_FILE: ${{ matrix.summary_file }}
          SUMMARY_TITLE: ${{ matrix.summary_title }}
        run: |
          set -e
          echo "🔍 Validating $SUITE_NAME benchmark results..."

          if [ ! -f "$SUMMARY_FILE" ]; then
            echo "❌ ERROR: benchmark summary file not found"
            exit 1
          fi
          echo "📊 $SUMMARY_TITLE:"
          column -t -s $'\t' "$SUMMARY_FILE"
          echo ""

          if [ ! -f "bench_results/benchmark.json" ]; then
            echo "❌ ERROR: benchmark JSON file not found"
            exit 1
          fi

          echo "✅ Benchmark results validated"
          echo ""
          echo "Generated files:"
          ls -lh bench_results/

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ${{ matrix.artifact_name_prefix }}-${{ github.run_number }}${{ matrix.artifact_name_suffix }}
          path: bench_results/
          retention-days: 30
          if-no-files-found: warn

      - name: Track benchmarks with Bencher
        env:
          BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
          BENCHER_REPORT_MARKER: ${{ matrix.report_marker }}
          BENCHMARK_SUITE_NAME: ${{ matrix.bencher_suite_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
        run: ruby benchmarks/track_benchmarks.rb

      - name: Benchmark workflow summary
        if: always()
        run: |
          echo "📋 Benchmark Workflow Summary"
          echo "===================================="
          echo "Suite: ${{ matrix.suite_name }}"
          echo "Shard: ${{ matrix.shard_label }}"
          echo "Status: ${{ job.status }}"
          echo "Run number: ${{ github.run_number }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Branch: ${{ github.ref_name }}"
