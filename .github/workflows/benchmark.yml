name: Benchmark Workflow

on:
  push:
    branches:
      - 'main'
    paths:
      - '.github/workflows/benchmark.yml'
      - '.github/workflows/benchmark-suite.yml'
      - 'benchmarks/**'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '.github/workflows/benchmark.yml'
      - '.github/workflows/benchmark-suite.yml'
      - 'benchmarks/**'
  # Hosted benchmarks are manual-only. The trusted trend runs on dedicated local
  # hardware via benchmarks/run-local-benchmark.rb and uploads to the m1-bench
  # Bencher testbed; shared GitHub-hosted runners are too noisy for automatic
  # regression signal.
  workflow_dispatch:
    inputs:
      routes:
        description: 'Comma-separated routes to benchmark (e.g., "/,/hello"). Leave empty to auto-detect from Rails.'
        required: false
        type: string
      rate:
        description: 'Requests per second (use "max" for maximum throughput)'
        required: false
        default: 'max'
        type: string
      duration:
        description: >-
          k6 duration PER SAMPLE (e.g., "12s", "30s", "1m") — each route runs
          BENCHMARK_SAMPLES (3) k6 samples and reports the medians. Empty = auto
          (12s per sample). Also the vegeta node-renderer suite's single-run duration.
        required: false
        default: ''
        type: string
      request_timeout:
        description: 'Request timeout (e.g., "60s", "1m", "90s")'
        required: false
        default: '60s'
        type: string
      connections:
        description: 'Concurrent connections/virtual users (also used as max)'
        required: false
        default: 10
        type: number
      web_concurrency:
        description: 'Number of Puma worker processes'
        required: false
        default: 4
        type: number
      rails_threads:
        description: 'Number of Puma threads (min and max will be same)'
        required: false
        default: 3
        type: number
      app_version:
        description: 'Which app version to benchmark'
        required: false
        default: 'both'
        type: choice
        options:
          - 'both'
          - 'core_only'
          - 'pro_only'
          - 'pro_rails_only'
          - 'pro_node_renderer_only'
# Cancel stale benchmark workflow runs for the same ref; only workflow_dispatch
# executes the hosted benchmark suites.
concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark-script-specs:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Read runtime versions
        id: tool-versions
        uses: ./.github/actions/read-tool-versions
      - name: Install gems for benchmark specs
        uses: ./.github/actions/setup-bundle
        with:
          working-directory: .
          ruby-version: ${{ steps.tool-versions.outputs.minimum-ruby-version }}
      - name: Run benchmark script specs
        run: bundle exec rspec benchmarks/spec

  prepare-benchmark-matrix:
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      actions: read
    runs-on: ubuntu-24.04
    outputs:
      run_benchmark_suites: ${{ steps.benchmark-matrices.outputs.run_benchmark_suites }}
      benchmark_matrix: ${{ steps.benchmark-matrices.outputs.benchmark_matrix }}
      base_sha: ${{ steps.benchmark-base.outputs.base_sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          # Full history: the base-resolution step below computes `git merge-base` with
          # origin/main, and a shallow boundary between a long-lived branch and its fork
          # point can make merge-base fail — or worse, silently resolve to a wrong base
          # inside the shallow window. This job is cheap and manual-dispatch-only.
          fetch-depth: 0
          persist-credentials: false
      - name: Read runtime versions
        id: tool-versions
        uses: ./.github/actions/read-tool-versions
      - name: Set benchmark matrices
        id: benchmark-matrices
        # Always runs. GitHub Actions evaluates `strategy.matrix` for downstream jobs at
        # workflow-construction time, before their `if:` gates — so an empty output would
        # crash `fromJSON('')` even when the consuming job is otherwise skipped.
        # Bump shard totals in benchmarks/generate_matrix.rb when a suite's route set
        # outgrows its current shard count.
        # The script is stdlib-only, so the runner's system Ruby is enough (no Bundler/Rails boot).
        env:
          BENCHMARK_APP_VERSION: ${{ github.event.inputs.app_version || 'both' }}
          BENCHMARK_EVENT_NAME: ${{ github.event_name }}
          BENCHMARK_ROUTES: ${{ github.event.inputs.routes || '' }}
        run: |
          BENCHMARK_MATRIX=$(ruby benchmarks/generate_matrix.rb)
          export BENCHMARK_MATRIX
          RUN_BENCHMARK_SUITES=$(ruby -rjson -e 'puts JSON.parse(ENV.fetch("BENCHMARK_MATRIX")).fetch("include").any? { |row| row.fetch("suite_id") != "none" }')

          {
            echo "run_benchmark_suites=$RUN_BENCHMARK_SUITES"
            echo "benchmark_matrix<<EOF"
            echo "$BENCHMARK_MATRIX"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        shell: bash
      # Relative continuous benchmarking (#3492): each suite job builds and benchmarks
      # BOTH this base and the dispatched head ref on the same runner, so the base must
      # be one concrete SHA resolved once here. Fail-loud by design: silently comparing
      # against an unintended base would be worse than aborting a manual dispatch.
      - name: Resolve benchmark comparison base
        id: benchmark-base
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            # Dispatch on main itself: compare against the previous main commit.
            base=$(git rev-parse --verify "HEAD^")
          else
            # Dispatch on a branch: compare against its merge-base with main.
            base=$(git merge-base HEAD origin/main)
          fi
          echo "Comparison base: $base"
          echo "base_sha=$base" >> "$GITHUB_OUTPUT"
        shell: bash

  # Manual hosted run of every selected suite/shard. Automatic push/PR benchmarks
  # are intentionally disabled; use the dedicated local M1 runner for the trusted
  # Bencher trend and reserve this workflow for explicit hosted diagnostics.
  benchmark:
    needs:
      - benchmark-script-specs
      - prepare-benchmark-matrix
    name: ${{ matrix.job_name }}
    if: github.event_name == 'workflow_dispatch' && needs.prepare-benchmark-matrix.outputs.run_benchmark_suites == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-benchmark-matrix.outputs.benchmark_matrix) }}
    permissions:
      contents: read
      issues: write
      pull-requests: write
      checks: write
    uses: ./.github/workflows/benchmark-suite.yml
    with:
      matrix_row: ${{ toJSON(matrix) }}
      base_sha: ${{ needs.prepare-benchmark-matrix.outputs.base_sha }}
    secrets:
      REACT_ON_RAILS_PRO_LICENSE_V2: ${{ secrets.REACT_ON_RAILS_PRO_LICENSE_V2 }}  # yamllint disable-line rule:line-length
      BENCHER_API_KEY: ${{ secrets.BENCHER_API_KEY }}
      BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
