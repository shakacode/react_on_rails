name: Rspec test for gem

permissions:
  contents: read

concurrency:
  group: ${{ github.event.pull_request.number && format('{0}-pr-{1}', github.workflow, github.event.pull_request.number) || format('{0}-{1}', github.workflow, github.sha) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  push:
    branches:
      - 'main'
    # Always trigger on main; non-runtime detection handles skipping heavy jobs
  pull_request:
    paths-ignore:
      - '**.md'
      - 'AGENTS_USER_GUIDE.md'
      - 'docs/**'
      - 'llms.txt'
      - 'llms-full.txt'
      - '.lychee.toml'
      - 'packages/**'
      - 'react_on_rails_pro/**'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run all jobs (bypass detect-changes)'
        required: false
        type: boolean
        default: false

jobs:
  detect-changes:
    permissions:
      contents: read
      actions: read
    runs-on: ubuntu-22.04
    outputs:
      docs_only: ${{ steps.detect.outputs.docs_only }}
      non_runtime_only: ${{ steps.detect.outputs.non_runtime_only }}
      run_lint: ${{ steps.detect.outputs.run_lint }}
      run_js_tests: ${{ steps.detect.outputs.run_js_tests }}
      run_ruby_tests: ${{ steps.detect.outputs.run_ruby_tests }}
      run_dummy_tests: ${{ steps.detect.outputs.run_dummy_tests }}
      run_generators: ${{ steps.detect.outputs.run_generators }}
      has_full_ci_label: ${{ steps.check-label.outputs.result }}
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch enough history for change detection (50 commits is usually sufficient for PRs)
          fetch-depth: 50
          persist-credentials: false
      - name: Check for full-ci label
        id: check-label
        uses: ./.github/actions/check-full-ci-label
      - name: Detect relevant changes
        id: detect
        run: |
          # If force_run is true OR full-ci label is present, run everything
          if [ "${{ inputs.force_run }}" = "true" ] || [ "${{ steps.check-label.outputs.result }}" = "true" ]; then
            echo "run_lint=true" >> "$GITHUB_OUTPUT"
            echo "run_js_tests=true" >> "$GITHUB_OUTPUT"
            echo "run_ruby_tests=true" >> "$GITHUB_OUTPUT"
            echo "run_dummy_tests=true" >> "$GITHUB_OUTPUT"
            echo "run_generators=true" >> "$GITHUB_OUTPUT"
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "non_runtime_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR_BEFORE="${{ github.event.before || '' }}"
          if [ "${{ github.event_name }}" = "pull_request" ] && [ -n "$PR_BEFORE" ] && [[ ! "$PR_BEFORE" =~ ^0+$ ]]; then
            BASE_REF="$PR_BEFORE"
          else
            BASE_REF="${{ github.event.pull_request.base.sha || github.event.before || 'origin/main' }}"
          fi
          script/ci-changes-detector "$BASE_REF"
        shell: bash
      - name: Set gem tests matrix
        id: set-matrix
        run: |
          # Determine if we should run full matrix (main or full-ci label)
          # Each Ruby version / dependency level is split into two shards:
          #   generators – spec/react_on_rails/generators (heavy filesystem I/O)
          #   unit       – everything else under spec/react_on_rails
          if [[ "${{ github.ref }}" == "refs/heads/main" ]] || \
             [[ "${{ steps.check-label.outputs.result }}" == "true" ]] || \
             [[ "${{ inputs.force_run }}" == "true" ]]; then
            # Full matrix: test both latest and minimum supported versions × 2 shards
            echo 'matrix={"include":[{"ruby-version":"3.4","dependency-level":"latest","shard":"generators"},{"ruby-version":"3.4","dependency-level":"latest","shard":"unit"},{"ruby-version":"3.2","dependency-level":"minimum","shard":"generators"},{"ruby-version":"3.2","dependency-level":"minimum","shard":"unit"}]}' >> $GITHUB_OUTPUT
          else
            # PR matrix: test only latest versions for fast feedback × 2 shards
            echo 'matrix={"include":[{"ruby-version":"3.4","dependency-level":"latest","shard":"generators"},{"ruby-version":"3.4","dependency-level":"latest","shard":"unit"}]}' >> "$GITHUB_OUTPUT"
          fi
      - name: Guard docs-only main pushes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ./.github/actions/ensure-main-docs-safety
        with:
          docs-only: ${{ steps.detect.outputs.docs_only }}
          previous-sha: ${{ github.event.before }}

  rspec-package-tests:
    needs: detect-changes
    # Skip only if: main push AND non-runtime-only changes
    # Otherwise run if: on main OR Ruby tests needed
    # This allows docs/comment-only commits to skip heavy jobs while ensuring full CI on main for code changes
    if: |
      !(
        github.event_name == 'push' &&
        github.ref == 'refs/heads/main' &&
        needs.detect-changes.outputs.non_runtime_only == 'true'
      ) && (
        github.ref == 'refs/heads/main' ||
        needs.detect-changes.outputs.run_ruby_tests == 'true'
      )
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler: 2.5.9
      - name: Print system information
        run: |
          echo "Linux release: "; cat /etc/issue
          echo "Current user: "; whoami
          echo "Current directory: "; pwd
          echo "Ruby version: "; ruby -v
          echo "Node version: "; node -v
          echo "Bundler version: "; bundle --version
      - name: run conversion script to use minimum supported dependency versions
        if: matrix.dependency-level == 'minimum'
        run: script/convert
      - name: Install Ruby Gems for package
        uses: ./.github/actions/setup-bundle
        with:
          working-directory: react_on_rails
          ruby-version: ${{ matrix.ruby-version }}
          frozen: ${{ matrix.dependency-level == 'minimum' && 'false' || 'true' }}
      - name: Git Stuff
        if: matrix.dependency-level == 'minimum'
        run: |
          git config user.email "you@example.com"
          git config user.name "Your Name"
          git commit -am "stop generators from complaining about uncommitted code"
      - name: Set dependency level environment variable
        run: |
          echo "CI_DEPENDENCY_LEVEL=${{ matrix.dependency-level }}" >> $GITHUB_ENV
      - name: Run rspec tests
        env:
          SHARD: ${{ matrix.shard }}
        run: |
          cd react_on_rails
          if [[ "$SHARD" = "generators" ]]; then
            bundle exec rspec spec/react_on_rails/generators
          else
            bundle exec rspec spec/react_on_rails --exclude-pattern "**/generators/**"
          fi
      - name: Store test results
        uses: actions/upload-artifact@v4
        with:
          name: main-rspec-${{ github.run_id }}-${{ github.job }}-ruby${{ matrix.ruby-version }}-${{ matrix.dependency-level }}-${{ matrix.shard }}
          path: ~/rspec
      - name: Store artifacts
        uses: actions/upload-artifact@v4
        with:
          name: main-test-log-${{ github.run_id }}-${{ github.job }}-ruby${{ matrix.ruby-version }}-${{ matrix.dependency-level }}-${{ matrix.shard }}
          path: log/test.log
