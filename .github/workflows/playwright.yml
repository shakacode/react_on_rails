name: Playwright E2E Tests

permissions:
  contents: read

concurrency:
  group: ${{ github.event.pull_request.number && format('{0}-pr-{1}', github.workflow, github.event.pull_request.number) || format('{0}-{1}', github.workflow, github.sha) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  push:
    branches: [main]
    # Always trigger on main; non-runtime detection handles skipping heavy jobs
  workflow_dispatch:

jobs:
  detect-changes:
    permissions:
      contents: read
      actions: read
    runs-on: ubuntu-22.04
    outputs:
      docs_only: ${{ steps.detect.outputs.docs_only }}
      non_runtime_only: ${{ steps.detect.outputs.non_runtime_only }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Detect relevant changes
        id: detect
        run: |
          BASE_REF="${{ github.event.before || 'origin/main' }}"
          script/ci-changes-detector "$BASE_REF"
        shell: bash
      - name: Guard docs-only main pushes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ./.github/actions/ensure-main-docs-safety
        with:
          docs-only: ${{ steps.detect.outputs.docs_only }}
          previous-sha: ${{ github.event.before }}

  playwright:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' || !(
        github.event_name == 'push' &&
        github.ref == 'refs/heads/main' &&
        needs.detect-changes.outputs.non_runtime_only == 'true'
      )
    steps:
      - uses: actions/checkout@v4
      - name: Read runtime versions
        id: tool-versions
        uses: ./.github/actions/read-tool-versions

      - name: Setup Ruby
        uses: ./.github/actions/setup-ruby
        with:
          # Keep the single E2E lane on the minimum runtime; matrix workflows cover latest.
          ruby-version: ${{ steps.tool-versions.outputs.minimum-ruby-minor-version }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: .minimum.tool-versions

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm run build

      - name: Install dummy app Ruby dependencies
        uses: ./.github/actions/setup-bundle
        with:
          working-directory: react_on_rails/spec/dummy
          ruby-version: ${{ steps.tool-versions.outputs.minimum-ruby-minor-version }}
          install-libyaml: 'false'

      - name: Install Playwright browsers
        working-directory: react_on_rails/spec/dummy
        run: npx playwright install --with-deps

      - name: Generate React on Rails packs
        working-directory: react_on_rails/spec/dummy
        env:
          RAILS_ENV: test
        run: bundle exec rake react_on_rails:generate_packs

      - name: Build test assets
        working-directory: react_on_rails/spec/dummy
        run: pnpm run build:test

      - name: Run Playwright tests
        working-directory: react_on_rails/spec/dummy
        run: pnpm run test:e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: react_on_rails/spec/dummy/e2e/playwright-report/
          retention-days: 30
