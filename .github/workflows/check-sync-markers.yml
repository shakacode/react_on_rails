---
name: Check Sync Markers

permissions:
  contents: read

"on":
  push:
    branches: [main]
    paths:
      - 'bin/lint-sync-markers'
      - 'packages/react-on-rails/**'
      - 'packages/react-on-rails-pro/**'
      - '.github/workflows/check-sync-markers.yml'
  pull_request:
    paths:
      - 'bin/lint-sync-markers'
      - 'packages/react-on-rails/**'
      - 'packages/react-on-rails-pro/**'
      - '.github/workflows/check-sync-markers.yml'
  merge_group:
  workflow_dispatch:

concurrency:
  group: sync-markers-${{ github.event.pull_request.number || github.ref_name || github.sha }}
  cancel-in-progress: true

jobs:
  check-sync-markers:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
        with:
          ruby-version: '4.0.5'

      - name: Check sync markers
        run: ruby bin/lint-sync-markers
