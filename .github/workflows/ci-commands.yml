name: CI Commands

on:
  issue_comment:
    types: [created]

concurrency:
  group: ci-command-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  handle-ci-command:
    # `contains` is case-insensitive, matching the command parser below.
    if: |
      github.event.issue.pull_request &&
      github.event.comment.user.type != 'Bot' &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
      contains(github.event.comment.body, '+ci-')
    runs-on: ubuntu-22.04
    permissions:
      actions: write
      contents: read
      issues: write
      pull-requests: read
    steps:
      - name: Handle +ci command
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.issue.number;
            const commentId = context.payload.comment.id;
            const actor = context.actor;
            const repoFullName = `${owner}/${repo}`;

            const validCommands = [
              '+ci-run-full',
              '+ci-skip-full',
              '+ci-stop-full',
              '+ci-status',
              '+ci-help'
            ];

            function commandText(commentBody) {
              return commentBody
                .replace(/```[\s\S]*?```/g, '')
                .replace(/~~~[\s\S]*?~~~/g, '')
                .split('\n')
                .filter((line) => !/^\s*>/.test(line))
                .join('\n');
            }

            function parseCommand(commentBody) {
              const match = commandText(commentBody)
                .match(/(?:^|\n)\s*(\+ci-[a-z0-9][a-z0-9-]*)(?:[ \t]+([^\n]*))?/i);

              if (!match) {
                return null;
              }

              return {
                command: match[1].toLowerCase(),
                args: (match[2] || '').trim()
              };
            }

            async function postComment(body) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body
              });
            }

            async function addReaction(content) {
              try {
                await github.rest.reactions.createForIssueComment({
                  owner,
                  repo,
                  comment_id: commentId,
                  content
                });
              } catch (error) {
                const status = error.status || 'unknown';
                const message = error.message || String(error);
                const details = `${status} ${message}`;
                core.warning(
                  `Reaction ${content} failed on comment ${commentId}: ` +
                  details
                );
              }
            }

            async function hasWriteAccess() {
              let permission;
              try {
                ({ data: permission } = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner,
                  repo,
                  username: actor
                }));
              } catch (error) {
                if ([403, 404].includes(error.status)) {
                  console.log(`Unable to read permission for ${actor}: ${error.status}`);
                  return false;
                }

                throw error;
              }

              return ['admin', 'write'].includes(permission.permission);
            }

            async function getPullRequest() {
              const { data: pr } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: issueNumber
              });

              return pr;
            }

            async function addFullCiLabel() {
              try {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: 'ready-for-full-ci',
                  description: 'Run full GitHub CI for this PR',
                  color: '0E8A16'
                });
              } catch (error) {
                if (error.status !== 422) {
                  throw error;
                }
              }

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: ['ready-for-full-ci']
              });
            }

            async function removeFullCiLabel() {
              let removed = false;
              for (const labelName of ['ready-for-full-ci', 'full-ci']) {
                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number: issueNumber,
                    name: labelName
                  });
                  removed = true;
                } catch (error) {
                  if (error.status !== 404) {
                    throw error;
                  }
                }
              }

              return removed;
            }

            async function listPullRequestLabels() {
              const labels = await github.paginate(github.rest.issues.listLabelsOnIssue, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100
              });

              return labels.map((label) => label.name);
            }

            async function listPullRequestFiles() {
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: issueNumber,
                per_page: 100
              });

              return files;
            }

            function isDocsOnlyPath(filename) {
              return filename.endsWith('.md') ||
                filename.endsWith('.mdx') ||
                filename.endsWith('.markdown') ||
                filename.endsWith('.rst') ||
                filename.endsWith('.txt') ||
                filename === '.lychee.toml' ||
                filename.startsWith('docs/') ||
                filename.startsWith('internal/') ||
                filename.startsWith('.github/ISSUE_TEMPLATE/') ||
                filename.startsWith('.claude/') ||
                filename.startsWith('.agents/') ||
                filename.startsWith('.cursor/');
            }

            function isDocsOnly(files) {
              return files.length > 0 &&
                files.every((file) => isDocsOnlyPath(file.filename));
            }

            async function findCurrentWaiver(sha) {
              const marker = `<!-- ci-skip-full:${sha} -->`;
              for await (const page of github.paginate.iterator(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100,
                sort: 'created',
                direction: 'desc'
              })) {
                const found = page.data.find((comment) =>
                  comment.user?.login === 'github-actions[bot]' &&
                  comment.user?.type === 'Bot' &&
                  (comment.body || '').startsWith(marker)
                );

                if (found) {
                  return found;
                }
              }

              return null;
            }

            function oneLine(value) {
              return value.replace(/[\r\n]+/g, ' ').replace(/`+/g, "'").trim();
            }

            function helpBody() {
              return [
                '## CI Commands',
                '',
                'Use these commands at the start of a PR comment line:',
                'Post one CI command per comment; if multiple commands are present, only the first is handled.',
                '',
                '- `+ci-run-full` - dispatch full CI and add `ready-for-full-ci` for future commits',
                '- `+ci-stop-full` - remove full CI readiness labels so future commits return to optimized CI',
                '- `+ci-skip-full [reason]` - record a SHA-bound waiver for the expensive full CI matrix',
                '- `+ci-status` - summarize the PR CI policy state',
                '- `+ci-help` - show this help',
                '',
                'Arguments are optional free text after the command. For example:',
                '',
                '```',
                '+ci-skip-full docs-only change; markdown checks are enough',
                '```'
              ].join('\n');
            }

            async function triggerFullCi(pr) {
              const headRepoFullName = pr.head.repo?.full_name;

              if (!headRepoFullName) {
                await addReaction('confused');
                await postComment([
                  'Unable to run full CI from this command because the PR head repository is unavailable.',
                  '',
                  'The repository may have been deleted or made private. A maintainer should push the branch to this repository or trigger the required workflows manually.'
                ].join('\n'));
                return;
              }

              if (headRepoFullName !== repoFullName) {
                await addReaction('confused');
                await postComment([
                  'Unable to run full CI from this command because the PR branch is from a fork.',
                  '',
                  'A maintainer should push the branch to this repository or trigger the required workflows manually.'
                ].join('\n'));
                return;
              }

              const workflows = [
                ['Lint JS and Ruby', 'lint-js-and-ruby.yml', { force_run: 'true' }],
                ['JS unit tests for Renderer package', 'package-js-tests.yml', { force_run: 'true' }],
                ['Rspec test for gem', 'gem-tests.yml', { force_run: 'true' }],
                ['Integration Tests', 'integration-tests.yml', { force_run: 'true' }],
                ['Assets Precompile Check', 'precompile-check.yml', { force_run: 'true' }],
                ['Generator tests', 'examples.yml', { force_run: 'true' }],
                ['Playwright E2E Tests', 'playwright.yml', {}],
                ['React on Rails Pro - Integration Tests', 'pro-integration-tests.yml', { force_run: 'true' }],
                ['React on Rails Pro - Package Tests', 'pro-test-package-and-gem.yml', { force_run: 'true' }]
              ];

              const dispatchResults = await Promise.allSettled(
                workflows.map(([workflowName, workflowFile, inputs]) =>
                  github.rest.actions.createWorkflowDispatch({
                    owner,
                    repo,
                    workflow_id: workflowFile,
                    ref: pr.head.ref,
                    inputs
                  }).then(() => ({ file: workflowFile, name: workflowName }))
                )
              );

              const succeeded = [];
              const failed = [];

              for (const [index, result] of dispatchResults.entries()) {
                if (result.status === 'fulfilled') {
                  succeeded.push(result.value);
                } else {
                  failed.push({
                    workflow: workflows[index][0],
                    error: result.reason?.message || String(result.reason)
                  });
                }
              }

              let labelAdded = false;
              if (succeeded.length > 0) {
                try {
                  await addFullCiLabel();
                  labelAdded = true;
                } catch (error) {
                  failed.push({ workflow: 'ready-for-full-ci label', error: error.message });
                }
              }

              await addReaction(succeeded.length > 0 ? 'rocket' : 'confused');

              const failedList = failed.length > 0
                ? `\n\nFailed:\n${failed.map((failure) => `- ${failure.workflow}: ${failure.error}`).join('\n')}`
                : '';
              const labelMessage = labelAdded
                ? 'Added `ready-for-full-ci`, so future commits on this PR will keep running full CI until `+ci-stop-full` is used.'
                : succeeded.length > 0
                  ? 'The workflows were triggered, but `ready-for-full-ci` was not added. See the failure details below.'
                  : '`ready-for-full-ci` was not added because no workflows were triggered.';

              await postComment([
                '## Full CI Requested',
                '',
                `Triggered ${succeeded.length} workflow(s) for \`${pr.head.sha.slice(0, 12)}\`.`,
                labelMessage,
                '',
                'View progress in the Actions tab.',
                failedList
              ].join('\n'));

              if (failed.length > 0) {
                core.setFailed(`Failed to trigger: ${failed.map((failure) => failure.workflow).join(', ')}`);
              }
            }

            async function handleSkipFull(pr, args) {
              const removedFullCi = await removeFullCiLabel();
              const reason = oneLine(args) || 'not provided';
              const shortSha = pr.head.sha.slice(0, 12);

              await postComment([
                `<!-- ci-skip-full:${pr.head.sha} -->`,
                '## Full CI Waiver Recorded for This SHA',
                '',
                `@${actor} recorded a full-CI waiver for \`${shortSha}\` (audit record only - no workflow run was cancelled or blocked).`,
                `Reason: \`${reason}\``,
                '',
                'This waiver is bound to the current head SHA and does not apply after another push.',
                'The required fast gate still applies for this PR.',
                ...(removedFullCi ? ['', 'Removed full CI readiness labels from this PR.'] : [])
              ].join('\n'));
            }

            async function handleStopFull() {
              const removed = await removeFullCiLabel();
              await postComment([
                '## Full CI Mode Disabled',
                '',
                removed
                  ? 'Removed full CI readiness labels. Future commits will use the fast required gate until full CI is requested again.'
                  : 'No full CI readiness labels were present. Future commits are already using the fast required gate.',
                '',
                'Use `+ci-run-full` to re-enable full CI mode.'
              ].join('\n'));
            }

            async function handleStatus(pr) {
              const [labels, files, waiver] = await Promise.all([
                listPullRequestLabels(),
                listPullRequestFiles(),
                findCurrentWaiver(pr.head.sha)
              ]);

              const docsOnly = isDocsOnly(files);
              const hasReadyForFullCi = labels.includes('ready-for-full-ci');
              const hasLegacyFullCi = labels.includes('full-ci');
              const hasFullCi = hasReadyForFullCi || hasLegacyFullCi;

              await postComment([
                '## CI Status',
                '',
                `Head SHA: \`${pr.head.sha.slice(0, 12)}\``,
                `Changed files: ${files.length}`,
                `Docs-only heuristic (matches ci-changes-detector metadata paths): ${docsOnly ? 'yes' : 'no'}`,
                `\`ready-for-full-ci\` label: ${hasReadyForFullCi ? 'present' : 'absent'}`,
                `Legacy \`full-ci\` label: ${hasLegacyFullCi ? 'present' : 'absent'}`,
                `Current full-CI waiver: ${waiver ? 'present for this SHA' : 'not present for this SHA'}`,
                '',
                hasFullCi
                  ? 'Full CI mode is enabled for this PR.'
                  : 'Fast required-gate mode is active unless full CI is requested.'
              ].join('\n'));
            }

            const parsed = parseCommand(context.payload.comment.body || '');
            if (!parsed) {
              return;
            }

            const userHasWriteAccess = await hasWriteAccess();

            if (!validCommands.includes(parsed.command)) {
              if (!userHasWriteAccess) {
                return;
              }

              await addReaction('confused');
              await postComment([
                `Unknown CI command: \`${parsed.command}\`.`,
                '',
                helpBody()
              ].join('\n'));
              return;
            }

            if (!userHasWriteAccess) {
              await postComment(`@${actor} Sorry, only repository collaborators with write access can use CI commands.`);
              core.warning(`User ${actor} does not have write access`);
              return;
            }

            const pr = await getPullRequest();

            switch (parsed.command) {
              case '+ci-run-full':
                await triggerFullCi(pr);
                break;
              case '+ci-skip-full':
                await addReaction('eyes');
                await handleSkipFull(pr, parsed.args);
                break;
              case '+ci-stop-full':
                await addReaction('eyes');
                await handleStopFull();
                break;
              case '+ci-status':
                await addReaction('eyes');
                await handleStatus(pr);
                break;
              case '+ci-help':
                await addReaction('eyes');
                await postComment(helpBody());
                break;
            }
