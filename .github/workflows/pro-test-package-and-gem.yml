name: React on Rails Pro - Package Tests

permissions:
  contents: read

on:
  push:
    branches:
      - 'main'
      - 'release/**'
    # Always trigger on main/release branches; non-runtime detection handles skipping heavy jobs
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  workflow_dispatch:
    inputs:
      force_full_hosted:
        description: 'Force full hosted CI (bypass optimized detect-changes)'
        required: false
        type: boolean
        default: false
      pull_request_base_ref:
        description: 'Pull request base branch for label/command dispatches'
        required: false
        type: string
      pull_request_base_sha:
        description: 'Pull request base SHA for label/command dispatches'
        required: false
        type: string

defaults:
  run:
    working-directory: react_on_rails_pro

jobs:
  detect-changes:
    # Skip Dependabot PRs — they can't access the Pro license secret.
    # Scoped to pull_request so push-to-main after merge still runs Pro CI.
    # Branch deletion push events have no checkoutable release ref.
    if: |
      (github.event_name != 'push' || github.event.deleted != true) &&
      (github.event_name != 'pull_request' || github.actor != 'dependabot[bot]')
    permissions:
      contents: read
      actions: read
      issues: read
    runs-on: ubuntu-22.04
    outputs:
      docs_only: ${{ steps.detect.outputs.docs_only }}
      non_runtime_only: ${{ steps.detect.outputs.non_runtime_only }}
      run_pro_lint: ${{ steps.detect.outputs.run_pro_lint }}
      run_pro_tests: ${{ steps.detect.outputs.run_pro_tests }}
      should_run_hosted_ci: ${{ steps.hosted-ci.outputs.should_run_hosted_ci }}
      should_force_full_hosted_ci: ${{ steps.hosted-ci.outputs.should_force_full_hosted_ci }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is only needed for workflow_dispatch base-SHA reruns.
          fetch-depth: ${{ github.event_name == 'workflow_dispatch' && '0' || '50' }}
          persist-credentials: false
      - name: Select hosted CI mode
        id: hosted-ci
        uses: ./.github/actions/hosted-ci-selectors
        with:
          force-full-hosted: ${{ inputs.force_full_hosted || false }}
          base-ref: ${{ inputs.pull_request_base_ref || '' }}
      - name: Detect relevant changes
        id: detect
        env:
          DISPATCH_BASE_REF: ${{ inputs.pull_request_base_ref || '' }}
          DISPATCH_BASE_SHA: ${{ inputs.pull_request_base_sha || '' }}
        working-directory: .
        run: |
          # Force-full hosted CI is the explicit escape hatch that bypasses
          # optimized change selection. Hosted readiness alone stays path-based.
          if [ "${{ steps.hosted-ci.outputs.should_force_full_hosted_ci }}" = "true" ]; then
            {
              echo "run_pro_lint=true"
              echo "run_pro_tests=true"
              echo "docs_only=false"
              echo "non_runtime_only=false"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "$DISPATCH_BASE_SHA" ]; then
            export GITHUB_BASE_REF="$DISPATCH_BASE_REF"
            BASE_REF="$DISPATCH_BASE_SHA"
          else
            BASE_REF="${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha || github.event.before || 'origin/main' }}"
          fi
          script/ci-changes-detector "$BASE_REF"
        shell: bash
      - name: Guard docs-only main pushes
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'merge_group' &&
           github.event.merge_group.base_ref == 'refs/heads/main')
        uses: ./.github/actions/ensure-main-docs-safety
        with:
          docs-only: ${{ steps.detect.outputs.docs_only }}
          previous-sha: ${{ github.event.before || github.event.merge_group.base_sha }}

  pro-lint:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.should_run_hosted_ci == 'true' &&
      needs.detect-changes.outputs.run_pro_lint == 'true'
    runs-on: ubuntu-22.04
    env:
      REACT_ON_RAILS_PRO_LICENSE: ${{ secrets.REACT_ON_RAILS_PRO_LICENSE_V2 }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Read runtime versions
        id: tool-versions
        uses: ./.github/actions/read-tool-versions

      - name: Setup Ruby
        uses: ./.github/actions/setup-ruby
        with:
          ruby-version: ${{ steps.tool-versions.outputs.minimum-ruby-version }}
          bundler-version: 2.5.4

      # Dependency-free guard (just git + ruby): every proprietary Pro file must
      # carry the non-MIT license header. See script/check-pro-license-headers.
      # Keep this early so missing headers fail before Node, pnpm, gems, or build.
      - name: Check Pro license headers
        # Override this workflow's react_on_rails_pro default; the checker lives at the repo root.
        working-directory: .
        run: |
          ruby script/check-pro-license-headers --self-test
          ruby script/check-pro-license-headers --check

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Latest Node comes from .tool-versions; pinned below the Node startup regression.
          # https://github.com/nodejs/node/issues/56010
          node-version-file: .tool-versions

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Print system information
        run: |
          echo "Linux release: "; cat /etc/issue
          echo "Current user: "; whoami
          echo "Current directory: "; pwd
          echo "Ruby version: "; ruby -v
          echo "Node version: "; node -v
          echo "pnpm version: "; pnpm --version
          echo "Bundler version: "; bundle --version

      - name: Install Ruby Gems for Pro package
        uses: ./.github/actions/setup-bundle
        with:
          working-directory: react_on_rails_pro
          ruby-version: ${{ steps.tool-versions.outputs.minimum-ruby-version }}
          install-libyaml: 'false'

      - name: Install Node modules with pnpm
        working-directory: .
        run: pnpm install --frozen-lockfile
      - name: Verify React 18 resolution for ExecJS-compatible dummy
        working-directory: .
        run: node script/check-react-major-version.mjs react_on_rails_pro/spec/execjs-compatible-dummy 18

      - name: Install Ruby Gems for Pro dummy app
        uses: ./.github/actions/setup-bundle
        with:
          working-directory: react_on_rails_pro/spec/dummy
          ruby-version: ${{ steps.tool-versions.outputs.minimum-ruby-version }}
          install-libyaml: 'false'

      - name: Generate file-system based entrypoints
        run: cd spec/dummy && bundle exec rake react_on_rails:generate_packs

      - name: Build react-on-rails-pro package
        working-directory: .
        run: pnpm --filter react-on-rails-pro build

      - name: Install Ruby Gems for root lint tools
        uses: ./.github/actions/setup-bundle
        with:
          working-directory: .
          ruby-version: ${{ steps.tool-versions.outputs.minimum-ruby-version }}
          install-libyaml: 'false'

      # RuboCop is owned by the root Gemfile/Gemfile.lock so OSS and Pro use one
      # locked lint version. Keep the Pro package Gemfile for RBS.
      - name: Lint Ruby
        env:
          BUNDLE_GEMFILE: ${{ github.workspace }}/Gemfile
        run: bundle exec rubocop --ignore-parent-exclusion

      - name: Validate RBS type signatures
        env:
          BUNDLE_GEMFILE: ${{ github.workspace }}/react_on_rails_pro/Gemfile
        run: bundle exec rake rbs:validate

      - name: Check TypeScript
        working-directory: .
        run: pnpm run nps check-typescript

  # Build webpack test bundles for dummy app
  build-dummy-app-webpack-test-bundles:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.should_run_hosted_ci == 'true' &&
      needs.detect-changes.outputs.run_pro_tests == 'true'
    runs-on: ubuntu-22.04
    env:
      REACT_ON_RAILS_PRO_LICENSE: ${{ secrets.REACT_ON_RAILS_PRO_LICENSE_V2 }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Read runtime versions
        id: tool-versions
        uses: ./.github/actions/read-tool-versions

      - name: Setup Ruby
        uses: ./.github/actions/setup-ruby
        with:
          ruby-version: ${{ steps.tool-versions.outputs.minimum-ruby-version }}
          bundler-version: 2.5.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Latest Node comes from .tool-versions; pinned below the Node startup regression.
          # https://github.com/nodejs/node/issues/56010
          node-version-file: .tool-versions

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Print system information
        run: |
          echo "Linux release: "; cat /etc/issue
          echo "Current user: "; whoami
          echo "Current directory: "; pwd
          echo "Ruby version: "; ruby -v
          echo "Node version: "; node -v
          echo "pnpm version: "; pnpm --version
          echo "Bundler version: "; bundle --version

      - name: Install Node modules with pnpm
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        working-directory: .
        run: pnpm run build
      - name: Verify single React resolution for Pro dummy build
        working-directory: .
        run: node script/check-single-react-resolution.mjs react_on_rails/spec/dummy react_on_rails_pro/spec/dummy
      - name: Verify React 18 resolution for ExecJS-compatible dummy
        working-directory: .
        run: node script/check-react-major-version.mjs react_on_rails_pro/spec/execjs-compatible-dummy 18

      - name: Install Ruby Gems for Pro dummy app
        uses: ./.github/actions/setup-bundle
        with:
          working-directory: react_on_rails_pro/spec/dummy
          ruby-version: ${{ steps.tool-versions.outputs.minimum-ruby-version }}
          install-libyaml: 'false'

      - name: Generate file-system based entrypoints
        run: cd spec/dummy && bundle exec rake react_on_rails:generate_packs
      - name: Smoke check generated pack entrypoints
        run: test -s spec/dummy/client/app/generated/server-bundle-generated.js

      - name: Build test bundles for Pro dummy app
        run: cd spec/dummy && pnpm run build:test

      - id: get-sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Save test webpack bundles to cache
        uses: actions/cache/save@v4
        with:
          path: |
            react_on_rails_pro/spec/dummy/public/webpack/test
            react_on_rails_pro/spec/dummy/ssr-generated
          key: v4-pro-dummy-app-webpack-bundle-${{ steps.get-sha.outputs.sha }}

  # Jest unit tests for Pro package
  package-js-tests:
    needs:
      - detect-changes
      - build-dummy-app-webpack-test-bundles
    if: |
      needs.detect-changes.outputs.should_run_hosted_ci == 'true' &&
      needs.detect-changes.outputs.run_pro_tests == 'true'
    runs-on: ubuntu-22.04
    # Redis service container
    services:
      redis:
        image: public.ecr.aws/docker/library/redis:6.2.6
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      REACT_ON_RAILS_PRO_LICENSE: ${{ secrets.REACT_ON_RAILS_PRO_LICENSE_V2 }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Latest Node comes from .tool-versions; pinned below the Node startup regression.
          # https://github.com/nodejs/node/issues/56010
          node-version-file: .tool-versions

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Print system information
        run: |
          echo "Linux release: "; cat /etc/issue
          echo "Current user: "; whoami
          echo "Current directory: "; pwd
          echo "Node version: "; node -v
          echo "pnpm version: "; pnpm --version

      - name: Remove old webpack bundles
        run: |
          rm -rf spec/dummy/public/webpack
          rm -rf spec/dummy/ssr-generated

      - id: get-sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Restore test webpack bundles from cache
        uses: actions/cache@v4
        with:
          path: |
            react_on_rails_pro/spec/dummy/public/webpack/test
            react_on_rails_pro/spec/dummy/ssr-generated
          key: v4-pro-dummy-app-webpack-bundle-${{ steps.get-sha.outputs.sha }}

      - name: Install Node modules with pnpm
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        working-directory: .
        run: pnpm run build

      - name: Run JS unit tests for Pro package
        run: pnpm --filter react-on-rails-pro-node-renderer run ci

        env:
          JEST_JUNIT_OUTPUT_DIR: ./jest
          JEST_JUNIT_ADD_FILE_ATTRIBUTE: "true"

      - name: Run Pro dummy Jest unit tests
        run: cd spec/dummy && pnpm run test:js

      - name: Store test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pro-jest-results
          path: packages/react-on-rails-pro-node-renderer/jest

  # RSpec tests for Pro package
  rspec-gem-specs:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.should_run_hosted_ci == 'true' &&
      needs.detect-changes.outputs.run_pro_tests == 'true'
    runs-on: ubuntu-22.04
    env:
      REACT_ON_RAILS_PRO_LICENSE: ${{ secrets.REACT_ON_RAILS_PRO_LICENSE_V2 }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Read runtime versions
        id: tool-versions
        uses: ./.github/actions/read-tool-versions

      - name: Setup Ruby
        uses: ./.github/actions/setup-ruby
        with:
          ruby-version: ${{ steps.tool-versions.outputs.minimum-ruby-version }}
          bundler-version: 2.5.4

      - name: Print system information
        run: |
          echo "Linux release: "; cat /etc/issue
          echo "Current user: "; whoami
          echo "Current directory: "; pwd
          echo "Ruby version: "; ruby -v
          echo "Bundler version: "; bundle --version

      - name: Install Ruby Gems for Pro package
        uses: ./.github/actions/setup-bundle
        with:
          working-directory: react_on_rails_pro
          ruby-version: ${{ steps.tool-versions.outputs.minimum-ruby-version }}
          install-libyaml: 'false'

      - name: Run RSpec tests for Pro package
        run: bundle exec rspec spec/react_on_rails_pro

      - name: Store test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pro-rspec-package-results-ruby${{ steps.tool-versions.outputs.minimum-ruby-version }}
          path: ~/rspec

      - name: Store test log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pro-rspec-package-log-ruby${{ steps.tool-versions.outputs.minimum-ruby-version }}
          path: react_on_rails_pro/log/test.log
