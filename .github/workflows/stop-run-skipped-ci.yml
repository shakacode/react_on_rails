name: Stop Full CI Suite

on:
  issue_comment:
    types: [created]

jobs:
  stop-full-ci:
    if: |
      github.event.issue.pull_request &&
      (
        startsWith(github.event.comment.body, '/stop-run-skipped-ci') ||
        contains(github.event.comment.body, '\n/stop-run-skipped-ci')
      )
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      issues: write
    steps:
      - name: Stop full CI mode
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.issue.number;
            const actor = context.actor;

            const { data: permission } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner,
              repo,
              username: actor
            });

            if (!['admin', 'write'].includes(permission.permission)) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: `@${actor} Sorry, only repository collaborators with write access can stop full CI runs.`
              });
              core.setFailed(`User ${actor} does not have permission to stop full CI`);
              return;
            }

            await github.rest.reactions.createForIssueComment({
              owner,
              repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

            let removed = false;
            for (const labelName of ['ready-for-full-ci', 'full-ci']) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  name: labelName
                });
                removed = true;
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: removed
                ? [
                    '## Full CI Mode Disabled',
                    '',
                    'Removed full CI readiness labels. Future commits will use the fast required gate until full CI is requested again.'
                  ].join('\n')
                : [
                    '## Full CI Mode Already Disabled',
                    '',
                    'No full CI readiness labels are present on this PR.'
                  ].join('\n')
            });
