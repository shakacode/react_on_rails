name: Stop Full CI Suite

on:
  issue_comment:
    types: [created]

jobs:
  stop-full-ci:
    # Only run on PR comments that match the command
    if: |
      github.event.issue.pull_request &&
      (
        startsWith(github.event.comment.body, '/stop-run-skipped-ci') ||
        contains(github.event.comment.body, '\n/stop-run-skipped-ci')
      )
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Check if user has write access
        id: check_access
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { data: permission } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: context.actor
              });

              const hasAccess = ['admin', 'write'].includes(permission.permission);
              console.log(`User ${context.actor} has permission: ${permission.permission}`);

              if (!hasAccess) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: `@${context.actor} Sorry, only repository collaborators with write access can stop full CI runs. 🔒`
                });
              }

              return hasAccess;
            } catch (error) {
              console.error('Error checking permissions:', error);
              return false;
            }

      - name: Exit if no access
        if: steps.check_access.outputs.result == 'false'
        run: |
          echo "User does not have permission to stop full CI"
          exit 1

      - name: Add reaction to comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ github.event.comment.id }}
          reactions: 'eyes'

      - name: Remove full-CI control labels
        uses: actions/github-script@v7
        with:
          script: |
            const labelsToRemove = ['full-ci', 'run-full-ci'];
            const removedLabels = [];

            for (const name of labelsToRemove) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name
                });
                removedLabels.push(name);
              } catch (error) {
                if (error.status !== 404) {
                  console.error('❌ Failed to remove label:', error);

                  const errorBody = [
                    '❌ **Error Removing Label**',
                    '',
                    'Failed to remove a full-CI control label: ' + error.message
                  ].join('\n');

                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    body: errorBody
                  });
                  // Use core.setFailed instead of throw to properly fail the workflow
                  core.setFailed(`Failed to remove label: ${error.message}`);
                  return;
                }
              }
            }

            if (removedLabels.length > 0) {
              console.log(`✅ Removed full-CI control labels from PR: ${removedLabels.join(', ')}`);

              const successBody = [
                '✅ **Full CI Mode Disabled**',
                '',
                `Removed ${removedLabels.map((label) => `\`${label}\``).join(', ')}. Future commits will use the standard CI suite (skipping tests for unchanged code).`,
                '',
                'To re-enable full CI mode, use the `/run-skipped-ci` command.'
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: successBody
              });
            } else {
              console.log('ℹ️  Full-CI control labels not found - already removed or never added');

              const notFoundBody = [
                'ℹ️  **Full CI Mode Already Disabled**',
                '',
                '`full-ci`/`run-full-ci` are not present on this PR. CI is already running in standard mode.'
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: notFoundBody
              });
            }
