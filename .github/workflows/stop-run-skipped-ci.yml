name: Stop Full CI Suite

on:
  issue_comment:
    types: [created]

jobs:
  stop-full-ci:
    # Only run on PR comments that match the command
    if: |
      github.event.issue.pull_request &&
      (
        startsWith(github.event.comment.body, '/stop-run-skipped-ci') ||
        contains(github.event.comment.body, '\n/stop-run-skipped-ci')
      )
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Check if user has write access
        id: check_access
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { data: permission } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: context.actor
              });

              const hasAccess = ['admin', 'write'].includes(permission.permission);
              console.log(`User ${context.actor} has permission: ${permission.permission}`);

              if (!hasAccess) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: `@${context.actor} Sorry, only repository collaborators with write access can stop full CI runs. 🔒`
                });
              }

              return hasAccess;
            } catch (error) {
              console.error('Error checking permissions:', error);
              return false;
            }

      - name: Exit if no access
        if: steps.check_access.outputs.result == 'false'
        run: |
          echo "User does not have permission to stop full CI"
          exit 1

      - name: Add reaction to comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ github.event.comment.id }}
          reactions: 'eyes'

      - name: Remove full CI readiness labels
        uses: actions/github-script@v7
        with:
          script: |
            const labelsToRemove = ['ready-for-full-ci', 'full-ci'];
            const removedLabels = [];
            const missingLabels = [];

            for (const label of labelsToRemove) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: label
                });
                removedLabels.push(label);
                console.log(`✅ Removed ${label} label from PR`);
              } catch (error) {
                if (error.status === 404) {
                  missingLabels.push(label);
                  console.log(`ℹ️  ${label} label not found - already removed or never added`);
                } else {
                  console.error('❌ Failed to remove label:', error);

                  const errorBody = [
                    '❌ **Error Removing Label**',
                    '',
                    `Failed to remove the \`${label}\` label: ${error.message}`
                  ].join('\n');

                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    body: errorBody
                  });
                  core.setFailed(`Failed to remove label: ${error.message}`);
                  return;
                }
              }
            }

            if (removedLabels.length > 0) {
              const successBody = [
                '✅ **Full CI Mode Disabled**',
                '',
                `Removed: ${removedLabels.map(label => `\`${label}\``).join(', ')}.`,
                '',
                'Future commits will use the fast required PR gate unless full CI is requested again.',
                '',
                'To re-enable full CI mode, use the `/run-skipped-ci` command.'
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: successBody
              });
              return;
            }

            const notFoundBody = [
              'ℹ️  **Full CI Mode Already Disabled**',
              '',
              'Neither `ready-for-full-ci` nor legacy `full-ci` is present on this PR. CI is already running in standard mode.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: notFoundBody
            });
